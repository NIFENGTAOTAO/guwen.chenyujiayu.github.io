const WENYAN_DATA = [
{id:"t1",title:"春夜宴桃李园序",author:"李白",dynasty:"唐",dynastyZh:"唐代",type:"序",length:"短篇",keyPoints:4,original:"夫天地者，万物之逆旅，光阴者，百代之过客。而浮生若梦，为欢几何？古人秉烛夜游，良有以也。况阳春召我以烟景，大块假我以文章。会桃李之芳园，序天伦之乐事。群季俊秀，皆为惠连；吾人咏歌，独惭康乐。幽赏未已，高谈转清。开琼筵以坐花，飞羽觞而醉月。不有佳作，何伸雅怀？如诗不成，罚依金谷酒数。",translation:"天地是万物的旅舍，光阴是百代的过客。浮荡的人生如同做梦，能欢乐的时光有多少呢？古人夜间拿着蜡烛游玩，实在是有道理的，何况温暖的春天以烟霭朦胧的景色召唤我，天地把美丽的景色借给我。大家聚会在芬芳的桃李园中，叙说天伦的乐事。各位弟弟都是才俊秀士，只有我在吟诗作乐方面惭愧不如谢灵运，没有好诗，如何抒发高雅的情怀？如果作诗不成，按照金谷园的规矩罚酒。",notes:[{w:"逆旅",m:"旅馆",t:"shi"},{w:"光阴",m:"时间",t:"shi"},{w:"浮生",m:"人生",t:"shi"},{w:"几何",m:"多少",t:"shi"},{w:"秉烛",m:"拿着蜡烛",t:"shi"},{w:"良有以",m:"实在是有道理",t:"shi"},{w:"群季",m:"各位弟弟",t:"shi"},{w:"者",m:"……的人（虚字）",t:"xu"},{w:"也",m:"语气词，表判断",t:"xu"},{w:"而",m:"可是（表转折）",t:"xu"},{w:"以",m:"用/来",t:"xu"},{w:"之",m:"的",t:"xu"},{w:"于",m:"在",t:"xu"},{w:"何",m:"怎么（疑问代词）",t:"xu"},{w:"如",m:"如果",t:"xu"}],quiz:[{q:"「浮生若梦」中「若」的意思是？",opts:["好像","如果","你","这样"],ans:0},{q:"「罚依金谷酒数」用了什么典故？",opts:["李白醉酒","石崇金谷园宴客罚酒","王羲之兰亭修禊","陶渊明饮酒"],ans:1},{q:"以下哪句是宾语前置？",opts:["会桃李之芳园","序天伦之乐事","不有佳作，何伸雅怀？","古人秉烛夜游"],ans:2}]},
{id:"t2",title:"兰亭集序",author:"王羲之",dynasty:"唐",dynastyZh:"唐代",type:"序",length:"长篇",keyPoints:5,original:"永和九年，岁在癸丑，暮春之初，会于会稽山阴之兰亭，修禊事也。群贤毕至，少长咸集。此地有崇山峻岭，茂林修竹；又有清流激湍，映带左右。引以为流觞曲水，列坐其次；虽无丝竹管弦之盛，一觞一咏，亦足以畅叙幽情。" + "\n" + "是日也，天朗气清，惠风和畅；仰观宇宙之大，俯察品类之盛；所以游目骋怀，足以极视听之娱，信可乐也。" + "\n" + "夫人之相与，俯仰一世，或取诸怀抱，晤言一室之内；或因寄所托，放浪形骸之外。虽趣舍万殊，静躁不同，当其欣于所遇，暂得于己，快然自足，不知老之将至。及其所之既倦，情随事迁，感慨系之矣。向之所欣，俯仰之间，已为陈迹，犹不能不以之兴怀；况修短随化，终期于尽。古人云：「死生亦大矣。」岂不痛哉！" + "\n" + "每览昔人兴感之由，若合一契，未尝不临文嗟悼，不能喻之于怀。固知一死生为虚诞，齐彭殇为妄作。后之视今，亦犹今之视昔，悲夫！故列叙时人，录其所述，虽世殊事异，所以兴怀，其致一也。后之览者，亦将有感于斯文。" + "\n" + "上一篇目　录",translation:"永和九年，晚春三月，我们聚集在会稽郡山阴县的兰亭，举行修禊活动。众多贤才都到了，老老少少都会集在一起。这里有高山峻岭，茂密的树林和高高的竹子，又有清澈的水流和湍急的漩涡。引水成为流觞的曲水，大家依次坐在水边，虽然没有演奏音乐的盛况，但一杯酒一首诗，也足以畅快地抒发内心深处的情感。这一天，天气晴朗，空气清新，和风温暖舒畅。抬头看宇宙的广大，低头看万物的繁盛，放眼游览舒展胸怀，足够尽情享受视听的娱乐实在是快乐啊。",notes:[{w:"修禊",m:"古代消除不祥的祭祀",t:"shi"},{w:"毕至",m:"都到了",t:"shi"},{w:"咸集",m:"都聚集",t:"shi"},{w:"修竹",m:"高高的竹子",t:"shi"},{w:"激湍",m:"湍急的水流",t:"shi"},{w:"流觞",m:"把酒杯放在流水上饮酒赋诗",t:"shi"},{w:"丝竹管弦",m:"音乐",t:"shi"},{w:"幽情",m:"内心深处的情感",t:"shi"},{w:"俯仰",m:"低头抬头，形容时间短暂",t:"shi"},{w:"于",m:"在",t:"xu"},{w:"之",m:"的 / 取独",t:"xu"},{w:"以",m:"用来/来",t:"xu"},{w:"虽",m:"虽然",t:"xu"},{w:"亦",m:"也",t:"xu"},{w:"足以",m:"足够用来",t:"xu"}],quiz:[{q:"「修禊事也」中「修」的意思是？",opts:["修理","整治、举行","长，高","美好"],ans:1},{q:"「俯仰一世」的正确解释是？",opts:["低头抬头就是一辈子","俯身仰视世界","看遍了世界","珍惜时间"],ans:0},{q:"「死生亦大矣」出自哪部书？",opts:["《论语》","《庄子》","《左传》","《礼记》"],ans:2}]},
{id:"t3",title:"祭十二郎文",author:"韩愈",dynasty:"唐",dynastyZh:"唐代",type:"祭文",length:"长篇",keyPoints:6,original:"年月日，季父愈闻汝丧之七日，乃能衔哀致诚，使建中远具时羞之奠，告汝十二郎之灵：" + "\n" + "呜呼！吾少孤，及长，不省所怙，惟兄嫂是依。中年，兄殁南方，吾与汝俱幼，从嫂归葬河阳。既又与汝就食江南。零丁孤苦，未尝一日相离也。吾上有三兄，皆不幸早世。承先人后者，在孙惟汝，在子惟吾。两世一身，形单影只。嫂尝抚汝指吾而言曰：「韩氏两世，惟此而已！」汝时尤小，当不复记忆。吾时虽能记忆，亦未知其言之悲也。" + "\n" + "吾年十九，始来京城。其后四年，而归视汝。又四年，吾往河阳省坟墓，遇汝从嫂丧来葬。又二年，吾佐董丞相于汴州，汝来省吾。止一岁，请归取其孥。明年，丞相薨。吾去汴州，汝不果来。是年，吾佐戎徐州，使取汝者始行，吾又罢去，汝又不果来。吾念汝从于东，东亦客也，不可以久。图久远者，莫如西归，将成家而致汝。呜呼！孰谓汝遽去吾而殁乎！吾与汝俱少年，以为虽暂相别，终当久相与处，故舍汝而旅食京师，以求斗斛之禄。诚知其如此，虽万乘之公相，吾不以一日辍汝而就也。" + "\n" + "去年，孟东野往。吾书与汝曰：「吾年未四十，而视茫茫，而发苍苍，而齿牙动摇。念诸父与诸兄，皆康强而早世。如吾之衰者，其能久存乎？吾不可去，汝不肯来，恐旦暮死，而汝抱无涯之戚也！」孰谓少者殁而长者存，强者夭而病者全乎！呜呼！其信然邪？其梦邪？其传之非其真邪？信也，吾兄之盛德而夭其嗣乎？汝之纯明而不克蒙其泽乎？少者、强者而夭殁，长者、衰者而存全乎？未可以为信也。梦也，传之非其真也，东野之书，耿兰之报，何为而在吾侧也？呜呼！其信然矣！吾兄之盛德而夭其嗣矣！汝之纯明宜业其家者，不克蒙其泽矣！所谓天者诚难测，而神者诚难明矣！所谓理者不可推，而寿者不可知矣！虽然，吾自今年来，苍苍者或化而为白矣，动摇者或脱而落矣。毛血日益衰，志气日益微，几何不从汝而死也。死而有知，其几何离；其无知，悲不几时，而不悲者无穷期矣。汝之子始十岁，吾之子始五岁。少而强者不可保，如此孩提者，又可冀其成立邪！呜呼哀哉！呜呼哀哉！" + "\n" + "汝去年书云：「比得软脚病，往往而剧。」吾曰：「是疾也，江南之人，常常有之。」未始以为忧也。呜呼！其竟以此而殒其生乎？抑别有疾而至斯乎？汝之书，六月十七日也。东野云，汝殁以六月二日；耿兰之报无月日。盖东野之使者，不知问家人以月日；如耿兰之报，不知当言月日。东野与吾书，乃问使者，使者妄称以应之耳。其然乎？其不然乎？" + "\n" + "今吾使建中祭汝，吊汝之孤与汝之乳母。彼有食，可守以待终丧，则待终丧而取以来；如不能守以终丧，则遂取以来。其余奴婢，并令守汝丧。吾力能改葬，终葬汝于先人之兆，然后惟其所愿。" + "\n" + "呜呼！汝病吾不知时，汝殁吾不知日；生不能相养以共居，殁不得抚汝以尽哀；敛不凭其棺，窆不临其穴。吾行负神明，而使汝夭；不孝不慈，而不能与汝相养以生，相守以死。一在天之涯，一在地之角，生而影不与吾形相依，死而魂不与吾梦相接。吾实为之，其又何尤！彼苍者天，曷其有极！自今已往，吾其无意于人世矣！当求数顷之田于伊颍之上，以待余年，教吾子与汝子，幸其成；长吾女与汝女，待其嫁，如此而已。呜呼！言有穷而情不可终，汝其知也邪！其不知也邪！呜呼哀哉！尚飨。" + "\n" + "上一篇目　录",translation:"某年某月某日，叔父韩愈听说你去世的第七天，才能怀着悲哀的心情表达诚意，派遣建中从远方备办应时的祭品，告诉你十二郎的灵魂：唉！我小时候成了孤儿，等到长大，不知道父亲的样子，只依靠哥哥和嫂子生活。哥哥中年时死在南方，我和你都还年幼，跟着嫂子回来安葬在河阳。后来又和你到江南谋生，孤苦伶仃，不曾有一天分离过。",notes:[{w:"季父",m:"叔父",t:"shi"},{w:"衔哀",m:"怀着悲哀",t:"shi"},{w:"致诚",m:"表达诚意",t:"shi"},{w:"省",m:"知道",t:"shi"},{w:"所怙",m:"所依靠的人（父亲）",t:"shi"},{w:"殁",m:"死",t:"shi"},{w:"零丁",m:"孤独无靠的样子",t:"shi"},{w:"惟兄嫂是依",m:"只依靠兄嫂（宾语前置句）",t:"shi"},{w:"惟",m:"只（副词）",t:"xu"},{w:"之",m:"取独",t:"xu"},{w:"乃",m:"才（副词）",t:"xu"}],quiz:[{q:"「惟兄嫂是依」是什么句式？",opts:["判断句","宾语前置（惟……是……）","省略句","被动句"],ans:1},{q:"「季父愈」中「季父」的意思是？",opts:["排行最小的儿子","叔父","父亲","兄长"],ans:1},{q:"「不省所怙」中「怙」的意思是？",opts:["依靠","父亲","兄长","帮助"],ans:1}]},
{id:"t4",title:"送孟东野序",author:"韩愈",dynasty:"唐",dynastyZh:"唐代",type:"序",length:"中篇",keyPoints:5,original:"大凡物不得其平则鸣。草木之无声，风挠之鸣；水之无声，风荡之鸣。其跃也，或激之；其趋也，或梗之；其沸也，或炙之。金石之无声，或击之鸣。人之于言也亦然。有不得已者而后言，其歌也有思，其哭也有怀。",translation:"大凡物体得不到平静就会发出声音。草木没有声音，风吹动它就发出声音；水没有声音，风吹荡它就发出声音。水波跳动，是因为有什么激荡它；水流急速，是因为有什么阻碍它；水沸腾，是因为有什么烧煮它。金石没有声音，有人敲击它就发出声音，人对于语言也是这样。有不得已的情况然后才说话，他唱歌是因为有思念，他哭是因为有怀念。",notes:[{w:"平",m:"平静，公平",t:"shi"},{w:"挠",m:"搅动",t:"shi"},{w:"激",m:"冲击，激荡",t:"shi"},{w:"梗",m:"阻塞，阻碍",t:"shi"},{w:"之",m:"取独，无实义",t:"xu"},{w:"于",m:"对/在",t:"xu"},{w:"其",m:"大概（表推测语气）",t:"xu"}],quiz:[{q:"「不得其平则鸣」的核心观点是？",opts:["万物都有声音","不平则鸣，有感而发","音乐来自自然","声音由风而生"],ans:1},{q:"「金石之无声，或击之鸣」中「或」的意思是？",opts:["有人","或许","有时","或者"],ans:0}]},
{id:"t5",title:"讳辩",author:"韩愈",dynasty:"唐",dynastyZh:"唐代",type:"论辩",length:"中篇",keyPoints:4,original:"愈与李贺书，劝贺举进士。贺举进士有名，与贺争名者毁之曰。律曰：二名不偏讳。今贺父名晋肃，贺举进士，为犯二名律乎？",translation:"韩愈写信给李贺，劝李贺参加进士考试。李贺考进士很有名望，和李贺争名的人攻击他。法律条文说两个字的名字不必同时避讳。现在李贺父亲名叫晋肃，李贺参加进士考试，是触犯二名律吗？",notes:[{w:"进士",m:"科举考试",t:"shi"},{w:"毁",m:"毁谤",t:"shi"},{w:"偏讳",m:"同时避两个字的名字",t:"shi"},{w:"为",m:"是",t:"xu"},{w:"与",m:"和",t:"xu"}],quiz:[{q:"李贺父亲名「晋肃」，反对者认为李贺不应考进士，因为？",opts:["晋和肃都是皇帝名字","晋与进音近，肃与素音近","违反了孝道","犯了考试规矩"],ans:1},{q:"「二名不偏讳」的意思是？",opts:["两个名字都可以不避讳","两个字的名字不必同时避讳","父亲的名有两个字","兄弟之间不用避讳"],ans:1}]},
{id:"t6",title:"与韩荆州书",author:"李白",dynasty:"唐",dynastyZh:"唐代",type:"书信",length:"中篇",keyPoints:4,original:"白闻天下谈士相聚而言曰：生不用封万户侯，但愿一识韩荆州！何令人之景慕一至于此？岂不以周公之风，躬吐握之事，使海内豪俊奔走而归之；一登龙门，则声价十倍。所以龙蟠凤逸之士，皆欲收名定价于君侯。",translation:"我听说天下议论之士聚在一起就说活着不必封万户侯，只想见一面韩荆州！为什么令人敬慕达到如此程度呢？难道不是因为周公的作风，亲自实行吐哺握发的事情，使海内的英雄豪杰奔走归附他；一旦登龙门，便声价提高十倍。所以像龙盘踞像凤飞逸的士人，都想在您这里得到名声和评价。",notes:[{w:"谈士",m:"议论之士",t:"shi"},{w:"万户侯",m:"很高的爵位",t:"shi"},{w:"吐握",m:"周公一饭三吐哺，一沐三握发，形容求贤若渴",t:"shi"},{w:"龙蟠凤逸",m:"比喻有才能的人隐居或待时而动",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"以",m:"因为",t:"xu"},{w:"而",m:"就",t:"xu"}],quiz:[{q:"「一饭三吐哺，一沐三握发」说的是谁？",opts:["刘备","周公","孔子","孟子"],ans:1},{q:"「龙蟠凤逸」在文中形容什么人？",opts:["皇帝","豪杰武士","隐居或待时的士人","商人"],ans:2}]},
{id:"t7",title:"阿房宫赋",author:"杜牧",dynasty:"唐",dynastyZh:"唐代",type:"赋",length:"长篇",keyPoints:5,original:"六王毕，四海一。蜀山兀，阿房出。覆压三百余里，隔离天日。骊山北构而西折，直走咸阳。二川溶溶，流入宫墙。五步一楼，十步一阁。廊腰缦回，檐牙高啄。各抱地势，钩心斗角。盘盘焉，囷囷焉，蜂房水涡，矗不知乎几千万落。长桥卧波，未云何龙？复道行空，不霁何虹？高低冥迷，不知西东。歌台暖响，春光融融。舞殿冷袖，风雨凄凄。一日之内，一宫之间，而气候不齐。" + "\n" + "妃嫔媵嫱，王子皇孙，辞楼下殿，辇来于秦。朝歌夜弦，为秦宫人。明星荧荧，开妆镜也。绿云扰扰，梳晓鬟也。渭流涨腻，弃脂水也。烟斜雾横，焚椒兰也。雷霆乍惊，宫车过也。辘辘远听，杳不知其所之也。一肌一容，尽态极妍。缦立远视，而望幸焉，有不得见者三十六年。" + "\n" + "燕、赵之收藏，韩、魏之经营，齐、楚之精英，几世几年，剽掠其人，倚叠如山。一旦不能有，输来其间。鼎铛玉石，金块珠砾，弃掷逦迤。秦人视之，亦不甚惜。" + "\n" + "嗟乎！一人之心，千万人之心也。秦爱纷奢，人亦念其家。奈何取之尽锱铢，用之如泥沙！使负栋之柱，多于南亩之农夫。架梁之椽，多于机上之工女。钉头磷磷，多于在庾之粟粒。瓦缝参差，多于周身之帛缕。直栏横槛，多于九土之城郭。管弦呕哑，多于市人之言语。使天下之人，不敢言而敢怒。独夫之心，日益骄固。戍卒叫，函谷举。楚人一炬，可怜焦土。" + "\n" + "呜呼！灭六国者，六国也，非秦也。族秦者，秦也，非天下也。嗟夫！使六国各爱其人，则足以拒秦。秦复爱六国之人，则递三世可至万世而为君，谁得而族灭也。秦人不暇自哀，而后人哀之。后人哀之，而不鉴之，亦使后人而复哀后人也。" + "\n" + "上一篇目　录",translation:"六国国王都完了，天下统一了。阿房宫覆盖绵延三百多里，遮蔽了天空和太阳。从骊山北面建构然后折向西面，一直通往咸阳。两条河水缓缓流淌，流进宫墙。五步一座楼，十步一座阁。走廊如腰般曲折回环，屋檐像牙齿般高高翘起。",notes:[{w:"六王毕",m:"六国国王都灭亡了",t:"shi"},{w:"覆压",m:"覆盖，遮蔽",t:"shi"},{w:"隔离天日",m:"遮蔽了天空和太阳",t:"shi"},{w:"钩心斗角",m:"形容宫殿建筑结构精巧，也比喻用尽心机",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"而",m:"却",t:"xu"},{w:"于",m:"在",t:"xu"}],quiz:[{q:"「钩心斗角」原意是？",opts:["互相争斗","建筑结构精巧，交错严密","心思巧妙","形容战争激烈"],ans:1},{q:"「阿房宫」是谁下令修建的？",opts:["秦始皇","汉武帝","唐太宗","项羽"],ans:0}]},
{id:"s1",title:"前赤壁赋",author:"苏轼",dynasty:"宋",dynastyZh:"宋代",type:"赋",length:"长篇",keyPoints:6,original:"壬戍之秋，七月既望，苏子与客泛舟游于赤壁之下。清风徐来，水波不兴。举酒属客，诵明月之诗，歌窈窕之章。少焉，月出于东山之上，徘徊于斗牛之间。白露横江，水光接天。纵一苇之所如，凌万顷之茫然。浩浩乎如冯虚御风，而不知其所止，飘飘乎如遗世独立，羽化而登仙。" + "\n" + "于是饮酒乐甚，扣舷而歌之。歌曰：「桂棹兮兰桨，击空明兮溯流光。渺渺兮予怀，望美人兮天一方。」客有吹洞萧者，倚歌而和之，其声呜呜然，如怨如慕，如泣如诉，余音袅袅，不绝如缕。舞幽壑之潜蛟，泣孤舟之嫠妇。" + "\n" + "苏子愀然，正襟危坐而问客曰：「何为其然也？」" + "\n" + "客曰：「『月明星稀，乌鹊南飞』，此非曹孟德之诗乎？西望夏口，东望武昌，山川相缪，郁乎苍苍，此非孟德之困于周郎者乎？方其破荆州，下江陵，顺流而东也，舳舻千里，旌旗蔽空，酾酒临江，横槊赋诗，固一世之雄也，而今安在哉！况吾与子，渔樵于江渚之上，侣鱼虾而友麋鹿；驾一叶之扁舟，举匏樽以相属；寄蜉蝣于天地，渺沧海之一粟。哀吾生之须臾，羡长江之无穷；挟飞仙以遨游，抱明月而长终；知不可乎骤得，托遗响于悲风。」" + "\n" + "苏子曰：「客亦知夫水与月乎？逝者如斯，而未尝往也。盈虚者如彼，而卒莫消长也。盖将自其变者而观之，则天地曾不能以一瞬；自其不变者而观之，则物与我皆无尽也。而又何羡乎？且夫天地之间，物各有主。苟非吾之所有，虽一毫而莫取；惟江上之清风，与山间之明月，耳得之而为声，目遇之而成色。取之无禁，用之不竭。是造物者之无尽藏也，而吾与子之所共适。」" + "\n" + "客喜而笑，洗盏更酌。肴核既尽，杯盘狼藉。相与枕籍乎舟中，不知东方之既白。" + "\n" + "后赤壁赋" + "\n" + "苏 轼 " + "\n" + "是岁十月之望，步自雪堂，将归于临皋，二客从予过黄泥之坂。霜露既降，木叶尽脱，人影在地，仰见明月，顾而乐之。行歌相答。已而叹曰：「有客无酒，有酒无肴，月白风清，如此良夜何？」客曰：「今者薄暮，举网得鱼，巨口细鳞，状似松江之鲈。顾安所得酒乎？」归而谋诸妇，妇曰：「我有斗酒，藏之久矣，以待子不时之须。」于是携酒与鱼，复游于赤壁之下。" + "\n" + "江流有声，断岸千尺；山高月小，水落石出。曾日月之几何，而江山不可复识矣！予乃摄衣而上，履岩，披蒙茸，踞虎豹，登虬龙，攀栖鹘之危巢，俯冯夷之幽宫，盖二客不能从焉。" + "\n" + "划然长啸，草木震动，山鸣谷应，风起水涌，予亦悄然而悲，肃然而恐，凛乎其不可留也！反而登舟，放乎中流，听其所止而休焉。" + "\n" + "时夜将半，四顾寂寥。适有孤鹤，横江东来，翅如车轮，玄裳缟衣，戛然长鸣，掠予舟而西也。须臾客去，予亦就睡。" + "\n" + "梦一道士，羽衣蹁跹，过临皋之下，揖予而言曰：「赤壁之游，乐乎？」问其姓名，俯而不答。「鸣呼噫嘻！我知之矣，畴昔之夜，飞鸣而过我者，非子也耶？」道士顾笑，予亦惊悟。开户视之，不见其处。" + "\n" + "上一篇目　录",translation:"壬戌年的秋天，七月十六日，我同客人乘船游览赤壁之下。清风缓缓吹来，江面水波平静。我举起酒杯劝客人饮酒。不一会儿，月亮从东山上升起，在斗宿和牛宿之间徘徊。白茫茫的水汽笼罩江面，波光连接着蓝天。任凭小船漂去，多么浩瀚啊，好像凌空御风而行；多么飘逸啊，好像离开人世，超然独立，成为神仙飞升仙境。",notes:[{w:"既望",m:"农历十六日",t:"shi"},{w:"泛舟",m:"乘船游玩",t:"shi"},{w:"徐来",m:"缓缓吹来",t:"shi"},{w:"属客",m:"劝客人",t:"shi"},{w:"徘徊",m:"来回移动",t:"shi"},{w:"白露",m:"白茫茫的水汽",t:"shi"},{w:"纵",m:"任凭",t:"shi"},{w:"一苇",m:"小船",t:"shi"},{w:"羽化",m:"成仙",t:"shi"},{w:"于",m:"在",t:"xu"},{w:"之",m:"的",t:"xu"},{w:"而",m:"表顺承/转折",t:"xu"}],quiz:[{q:"「七月既望」中「既望」指农历哪一天？",opts:["十五","十六","十七","三十"],ans:1},{q:"「纵一苇之所如」中「一苇」比喻？",opts:["一片叶子","芦苇","小船","一叶扁舟"],ans:3},{q:"「羽化而登仙」的「羽化」是哪种词类活用？",opts:["名词作动词","动词作名词","使动用法","意动用法"],ans:0}]},
{id:"s2",title:"后赤壁赋",author:"苏轼",dynasty:"宋",dynastyZh:"宋代",type:"赋",length:"中篇",keyPoints:4,original:"是岁十月之望，步自雪堂，将归于临皋，二客从予过黄泥之坂。霜露既降，木叶尽脱，人影在地，仰见明月，顾而乐之。行歌相答。已而叹曰：「有客无酒，有酒无肴，月白风清，如此良夜何？」客曰：「今者薄暮，举网得鱼，巨口细鳞，状似松江之鲈。顾安所得酒乎？」归而谋诸妇，妇曰：「我有斗酒，藏之久矣，以待子不时之须。」于是携酒与鱼，复游于赤壁之下。" + "\n" + "江流有声，断岸千尺；山高月小，水落石出。曾日月之几何，而江山不可复识矣！予乃摄衣而上，履岩，披蒙茸，踞虎豹，登虬龙，攀栖鹘之危巢，俯冯夷之幽宫，盖二客不能从焉。" + "\n" + "划然长啸，草木震动，山鸣谷应，风起水涌，予亦悄然而悲，肃然而恐，凛乎其不可留也！反而登舟，放乎中流，听其所止而休焉。" + "\n" + "时夜将半，四顾寂寥。适有孤鹤，横江东来，翅如车轮，玄裳缟衣，戛然长鸣，掠予舟而西也。须臾客去，予亦就睡。" + "\n" + "梦一道士，羽衣蹁跹，过临皋之下，揖予而言曰：「赤壁之游，乐乎？」问其姓名，俯而不答。「鸣呼噫嘻！我知之矣，畴昔之夜，飞鸣而过我者，非子也耶？」道士顾笑，予亦惊悟。开户视之，不见其处。" + "\n" + "上一篇目　录",translation:"这一年十月十六日，我步行从雪堂出发，准备回到临皋亭。两位客人跟随我，经过黄泥坂。霜露已经降临，树叶全部脱落，人的影子映在地上，抬头看见明月，四顾之下心中欢乐，边走边唱，互相应和。过了一会儿感叹说有客却没有酒，有酒却没有菜，月光洁白微风清朗，这样美好的夜晚怎么度过呢！",notes:[{w:"是岁",m:"这一年",t:"shi"},{w:"之望",m:"十六日",t:"shi"},{w:"霜露",m:"霜和露水",t:"shi"},{w:"人影在地",m:"人的影子映在地上",t:"shi"},{w:"顾",m:"看，四顾",t:"shi"},{w:"相答",m:"互相应和",t:"shi"},{w:"于",m:"在",t:"xu"},{w:"之",m:"的",t:"xu"}],quiz:[{q:"「二客从予」中「从」的意思是？",opts:["跟随","依从","从容","向"],ans:0},{q:"「顾而乐之」中「顾」的意思是？",opts:["回头看","照顾","顾及","只是"],ans:0}]},
{id:"s3",title:"岳阳楼记",author:"范仲淹",dynasty:"宋",dynastyZh:"宋代",type:"记",length:"长篇",keyPoints:5,original:"庆历四年春，滕子京谪守巴陵郡。越明年，政通人和，百废具兴，乃重修岳阳楼，增其旧制，刻唐贤今人诗赋于其上，属予作文以记之。" + "\n" + "予观夫巴陵胜状，在洞庭一湖。衔远山，吞长江，浩浩汤汤，横无际涯；朝晖夕阴，气象万千；此则岳阳楼之大观也，前人之述备矣。然则北通巫峡，南极潇湘，迁客骚人，多会于此，览物之情，得无异乎？" + "\n" + "若夫霪雨霏霏，连月不开；阴风怒号，浊浪排空；日星隐耀，山岳潜形；商旅不行，樯倾楫摧；薄暮冥冥，虎啸猿啼；登斯楼也，则有去国怀乡，忧谗畏讥，满目萧然，感极而悲者矣。" + "\n" + "至若春和景明，波澜不惊，上下天光，一碧万顷；沙鸥翔集，锦鳞游泳，岸芷汀兰，郁郁青青。而或长烟一空，皓月千里，浮光跃金，静影沈璧，渔歌互答，此乐何极！登斯楼也，则有心旷神怡，宠辱皆忘，把酒临风，其喜洋洋者矣。" + "\n" + "嗟夫！予尝求古仁人之心，或异二者之为，何哉？不以物喜，不以己悲，居庙堂之高，则忧其民；处江湖之远，则忧其君。是进亦忧，退亦忧；然则何时而乐耶？其必曰：先天下之忧而忧，后天下之乐而乐欤！噫！微斯人，吾谁与归！" + "\n" + "上一篇目　录",translation:"庆历四年的春天，滕子京被贬为巴陵郡太守。过了第二年，政事顺利，百姓和乐，许多荒废的事业都兴办起来了。于是重新修建岳阳楼，扩大它原有的规模，在楼上刻上唐代名士和当代人的诗赋，嘱托我写文章来记述这件事。我看那巴陵郡最美的景色，全在这洞庭湖上。它包含远方的山脉，吞吐长江的流水，水流浩浩荡荡，宽广得看不到边际；早晨阳光灿烂，傍晚暮色笼罩，景象千变万化，这就是岳阳楼的壮丽景象。既然这样，那么北面直通巫峡，南面直到潇水湘江，被贬的官员和诗人常常在这里聚会，他们观赏景物的心情，大概会有不同吧？",notes:[{w:"谪守",m:"被贬做太守",t:"shi"},{w:"越明年",m:"到了第二年",t:"shi"},{w:"政通人和",m:"政事顺遂，百姓和乐",t:"shi"},{w:"百废具兴",m:"许多荒废的事都兴办起来",t:"shi"},{w:"胜状",m:"美景",t:"shi"},{w:"浩浩汤汤",m:"水势浩大",t:"shi"},{w:"大观",m:"壮丽的景象",t:"shi"},{w:"备",m:"详尽",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"于",m:"在/到",t:"xu"},{w:"然则",m:"既然这样，那么",t:"xu"},{w:"得无",m:"能不，大概会",t:"xu"}],quiz:[{q:"「政通人和」中「和」的意思是？",opts:["和平","和乐","和气","和谐"],ans:1},{q:"「前人之述备矣」中「备」的意思是？",opts:["准备","完备、详尽","具备","防备"],ans:1}]},
{id:"s4",title:"范增论",author:"苏轼",dynasty:"宋",dynastyZh:"宋代",type:"论",length:"中篇",keyPoints:4,original:"汉用陈平计，间疏楚君臣，项羽疑范增与汉有私，稍夺其权。增大怒曰：天下事大定矣，君王自为之，愿赐骸骨，归卒伍。归未至彭城，疽发背死。苏子曰：增之去，善矣。不去，羽必杀增。独恨其不早尔。",translation:"刘邦采用陈平的计策，离间项羽君臣关系，项羽怀疑范增和汉国有私交，渐渐削夺他的权力。范增非常生气说天下大事已经基本安定了，君王自己做吧，希望赏赐我骸骨，让我退职回家当普通士兵。回去还没到彭城，背上发毒疮死了。苏子说范增离开是对的。不离开，项羽必定会杀他。只遗憾他离开得太早了。",notes:[{w:"间疏",m:"离间并疏远",t:"shi"},{w:"私",m:"私交",t:"shi"},{w:"骸骨",m:"身体，借指退休",t:"shi"},{w:"疽",m:"毒疮",t:"shi"},{w:"善",m:"对，好",t:"shi"},{w:"独恨",m:"只遗憾",t:"shi"},{w:"之",m:"取独",t:"xu"},{w:"以",m:"因为",t:"xu"}],quiz:[{q:"范增离开项羽的原因是什么？",opts:["年纪大了想退休","被离间计所伤","项羽开始怀疑并削夺他的权力","想另谋高就"],ans:2}]},
{id:"s5",title:"晁错论",author:"苏轼",dynasty:"宋",dynastyZh:"宋代",type:"论",length:"中篇",keyPoints:4,original:"天下之患，最不可为者，名为治平无事，而其实有不测之忧。坐观其变而不为之所，则恐至于不可救。起而强为之，则天下狃于治平之安，而不吾信。惟仁人君子豪杰之士，为能出身为天下犯大难，以求成大功。",translation:"天下的祸患，最不能去做的，是名义上太平无事，而实际上有无法预料的忧患。坐着观看事态变化却不去采取行动，就恐怕到了无法挽救的地步。起来勉强去做，天下人就会因为习惯于太平安定的生活，而不信任我们。只有仁人君子豪杰之士，才能挺身为天下的大难去冒险，来求取大的功名。",notes:[{w:"治平",m:"太平安定",t:"shi"},{w:"不测之忧",m:"无法预料的忧患",t:"shi"},{w:"为之所",m:"采取行动",t:"shi"},{w:"狃于",m:"习惯于",t:"shi"},{w:"不吾信",m:"不信任我（宾语前置）",t:"shi"},{w:"出身",m:"挺身而出",t:"shi"},{w:"之",m:"取独",t:"xu"},{w:"而",m:"却/就",t:"xu"}],quiz:[{q:"「不吾信」是什么句式？",opts:["判断句","宾语前置（不吾=吾不）","被动句","省略句"],ans:1}]},
{id:"m1",title:"卖柑者言",author:"刘基",dynasty:"明",dynastyZh:"明代",type:"寓言",length:"中篇",keyPoints:4,original:"杭有卖果者，善藏柑，涉寒暑不溃，出之烨然，玉质而金色。置于市，贾十倍，人争鬻之。予贸得其一，剖之，如有烟扑口鼻。视其中，则干若败絮。予怪而问之曰： 「若所市于人者，将以实笾豆，奉祭祀、供宾客乎？将炫外以惑愚瞽也？甚矣哉，为欺也！」" + "\n" + "卖者笑曰：「吾业是有年矣，吾赖是以食吾躯。吾售之，人取之，未尝有言，而独不足于子乎！世之为欺者不寡矣，而独我也乎？吾子未之思也！今夫佩虎符、坐皋比者，洸洸乎干城之具也，果能授孙、吴之略耶？峨大冠、托长绅者，昂昂乎庙堂之器也，果能建伊、皋之业耶？盗起而不知御，民困而不知救，吏奸而不知禁，法而不知理，坐縻廪粟而不知耻。观其坐高堂、骑大马、醉醇醴而饫肥鲜者，孰不巍巍乎可畏，赫赫乎可象也！又何往而不金玉其外、败絮其中也哉！今子是之不察，而以察吾柑！」" + "\n" + "予默然无应。退而思其言，类东方生滑稽之流。岂其愤世疾邪者耶？而托于柑以讽耶？" + "\n" + "上一篇目　录",translation:"杭州有个卖水果的，擅长贮藏柑子，经过一整年也不腐烂。拿出来依然光彩鲜明，质地像玉石一样温润，颜色像黄金一样灿烂。放在市场上，价格高出十倍，人们争相购买。我买了一个，剖开它，好像有烟气扑向口鼻，看它里面，却干燥得像破烂的棉絮。我奇怪地问他。",notes:[{w:"卖果者",m:"卖水果的人",t:"shi"},{w:"烨然",m:"光彩鲜明",t:"shi"},{w:"贾",m:"价格",t:"shi"},{w:"贸",m:"买",t:"shi"},{w:"以",m:"用",t:"xu"},{w:"而",m:"却",t:"xu"}],quiz:[{q:"「贾十倍」中「贾」的意思是？",opts:["jia4价格","jia3商人","gu3商人","gu3买"],ans:0}]},
{id:"m2",title:"捕蛇者说",author:"柳宗元",dynasty:"明",dynastyZh:"明代",type:"说",length:"长篇",keyPoints:5,original:"永州之野产异蛇，黑质而白章，触草木尽死；以啮人，无御之者。然得而腊之以为饵，可以已大风、挛踠、瘘疠，去死肌，杀三虫。其始太医以王命聚之，岁赋其二；募有能捕之者，当其租入。永之人争奔走焉。" + "\n" + "有蒋氏者，专其利三世矣。问之，则曰：「吾祖死于是，吾父死于是，今吾嗣为之十二年，几死者数矣。」言之貌若甚戚者。余悲之，且曰：「若毒之乎？余将告于莅事者，更若役，复若赋，则如何？」蒋氏大戚，汪然出涕，曰：「君将哀而生之乎？则吾斯役之不幸，未若复吾赋不幸之甚也。向吾不为斯役，则久已病矣。自吾氏三世居是乡，积于今六十岁矣。而乡邻之生日蹙，殚其地之出，竭其庐之入。号呼而转徙，饿渴而顿踣。触风雨，犯寒暑，呼嘘毒疠，往往而死者，相藉也。曩与吾祖居者，今其室十无一焉。与吾父居者，今其室十无二三焉。与吾居十二年者，今其室十无四五焉。非死即徙尔，而吾以捕蛇独存。悍吏之来吾乡，叫嚣乎东西，隳突乎南北；哗然而骇者，虽(又鸟)狗不得宁焉。吾恂恂而起，视其缶，而吾蛇尚存，则弛然而卧。谨食之，时而献焉。退而甘食其土之有，以尽吾齿。盖一岁之犯死者二焉，其余则熙熙而乐，岂若吾乡邻之旦旦有是哉。今虽死乎此，比吾乡邻之死则已后矣，又安敢毒耶？」" + "\n" + "余闻而愈悲，孔子曰：「苛政猛于虎也。」吾尝疑乎是，今以蒋氏观之，犹信。呜呼！孰知赋敛之毒，有甚是蛇者乎！故为之说，以俟夫观人风者得焉。" + "\n" + "上一篇目　录",translation:"永州的野外出产一种奇异的蛇，黑色的身子白色的花纹；碰到草木，草木全都枯死；如果咬了人，就没有能抵御它的。然而捉到它把它晾成干肉做成药饵，可以治好大风、痉挛、瘘管、恶疮等疾病，去除腐烂的肌肉，杀死体内的寄生虫。起初，太医奉皇帝的命令收集这种蛇，每年征收两条。",notes:[{w:"黑质而白章",m:"黑底色白花纹",t:"shi"},{w:"啮",m:"咬",t:"shi"},{w:"御",m:"抵御",t:"shi"},{w:"腊之",m:"把蛇晾成干肉",t:"shi"},{w:"已",m:"治好",t:"shi"},{w:"去死肌",m:"去除腐烂的肌肉",t:"shi"},{w:"三虫",m:"体内寄生虫",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"以",m:"用/拿",t:"xu"}],quiz:[{q:"「可以已大风」中「已」的意思是？",opts:["已经","停止","治愈","用来"],ans:2}]},
{id:"m3",title:"瘗旅文",author:"王守仁",dynasty:"明",dynastyZh:"明代",type:"祭文",length:"中篇",keyPoints:4,original:"维正德四年，秋月三日，有吏目云自京来者，不知其名氏，携一子、一仆将之任，过龙场，投宿土苗家。予从篱落间望见之，阴雨昏黑，欲就问讯北来事，不果。明早，遣人觇之，已行矣。薄午，有人自蜈蚣坡来，云：一老人死坡下，傍两人哭之哀。予曰：此必吏目死矣。伤哉！",translation:"正德四年，秋月三日，有一个据说从京城来的小官，不知道他的姓名，带着一个儿子、一个仆人赴任，路过龙场，在当地苗人家借宿。我从篱笆缝隙间看见他，当时阴雨天气天色昏黑，想要走近询问，没有成。第二天早上，派人去看他，已经走了。将近中午，有人从蜈蚣坡来，说一个老人死在坡下，身旁两个人哭得很悲伤。我说这一定是那个小官死了。可悲啊！",notes:[{w:"维",m:"发语词",t:"shi"},{w:"觇",m:"窥视，探看",t:"shi"},{w:"暴骨",m:"暴露在外的尸骨",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"而",m:"却/就",t:"xu"}],quiz:[{q:"这篇文章的作者是谁？",opts:["韩愈","柳宗元","王守仁","宋濂"],ans:2}]},
{id:"m4",title:"阅江楼记",author:"宋濂",dynasty:"明",dynastyZh:"明代",type:"记",length:"中篇",keyPoints:4,original:"金陵为帝王之州。自六朝迄于南唐，类皆偏据一方，无以应山川之王气。逮我皇帝，定鼎于兹，始足以当之。由是声教所暨，罔间朔南，存神穆清，与道同体。虽一豫一游，亦思为天下后世法。",translation:"金陵是帝王的州邑。从六朝到南唐，大都是偏安一方，没有能应验山川所显示的帝王气象。等到我朝皇帝，在这建都，才足以与之相配。从此声威教化所达到的地方，不分南北，人们神志安和清静，与道融为一体。即使是一次巡游，也想着为天下和后世树立典范。",notes:[{w:"定鼎",m:"建立国都，定都",t:"shi"},{w:"声教",m:"声威教化",t:"shi"},{w:"罔间",m:"不分，没有区别",t:"shi"},{w:"朔南",m:"北方和南方",t:"shi"},{w:"穆清",m:"清静，安和",t:"shi"},{w:"之",m:"取独",t:"xu"},{w:"以",m:"因为",t:"xu"}],quiz:[{q:"「定鼎于兹」的意思是？",opts:["在这里铸造大鼎","在这里建立国都","在这里安定天下","在这里驻扎军队"],ans:1}]},
{id:"m5",title:"信陵君救赵论",author:"唐顺之",dynasty:"明",dynastyZh:"明代",type:"论",length:"长篇",keyPoints:4,original:"论者以窃符为信陵君之罪，余以为此未足以罪信陵也。夫强秦之暴亟矣，今悉兵以临赵，赵必亡。赵，魏之障也。赵亡，则魏且为之后。赵、魏，又楚、燕、齐诸国之障也。天下之势，未有岌岌于此者也。",translation:"议论的人把偷窃兵符作为信陵君的罪过，我认为这不足以用来怪罪信陵君。那强大的秦国暴虐到了极点，现在用全部兵力逼近赵国，赵国必然灭亡。赵国是魏国的屏障。赵国灭亡了，魏国就将紧随其后。赵国魏国，又是楚、燕、齐各国的屏障。天下的形势，没有比这更危险的了。",notes:[{w:"窃符",m:"偷窃兵符",t:"shi"},{w:"暴亟",m:"暴虐到了极点",t:"shi"},{w:"悉兵",m:"全部兵力",t:"shi"},{w:"障",m:"屏障",t:"shi"},{w:"岌岌",m:"危险的样子",t:"shi"},{w:"以",m:"用来",t:"xu"}],quiz:[{q:"「天下之势，未有岌岌于此者也」的意思是？",opts:["天下最安定","天下没有比这更危险的","天下即将统一","天下已经太平"],ans:1}]},
{id:"m6",title:"豫让论",author:"方孝孺",dynasty:"明",dynastyZh:"明代",type:"论",length:"中篇",keyPoints:4,original:"士君子立身事主，既名知己，则当竭尽智谋，忠告善道，销患于未形，保治于未然，俾身全而主安。生为名臣，死为上鬼，垂光百世，照耀简策，斯为美也。苟遇知己，不能扶危于未乱之先，而乃捐躯殒命于既败之后；钓名沽誉，眩世骇俗，由君子观之，皆所不取也。",translation:"士君子立身处世侍奉君主，既然被称作知己，就应当竭尽智谋，忠诚地劝告善于引导，在祸患还没有形成时就消除它，使自身保全而君主平安。活着是名臣，死了是上等的鬼魂，流芳百世，照耀史册，这才是完美的。如果遇到知己，不能在动乱还没有发生之前扶持危局，而到已经失败之后才捐躯丧命；沽名钓誉，迷惑世间惊骇世俗，从君子看来，都是不可取的。",notes:[{w:"事主",m:"侍奉君主",t:"shi"},{w:"知己",m:"了解自己的人",t:"shi"},{w:"忠告善道",m:"忠诚劝告善于引导",t:"shi"},{w:"销患",m:"消除祸患",t:"shi"},{w:"俾",m:"使",t:"shi"},{w:"捐躯",m:"舍弃身躯",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"于",m:"在",t:"xu"},{w:"而",m:"却",t:"xu"}],quiz:[{q:"方孝孺认为豫让的行为「未忠」指的是什么？",opts:["不应该为智伯报仇","失败之后才死","不应该用漆身吞炭的方式","不应该让后人知道"],ans:1}]},
{id:"m7",title:"吊古战场文",author:"李华",dynasty:"明",dynastyZh:"明代",type:"赋",length:"长篇",keyPoints:5,original:"浩浩乎！平沙无垠，敻不见人，河水萦带，群山纠纷。黯兮惨悴，风悲日曛。蓬断草枯，凛若霜晨。鸟飞不下，兽铤亡群。亭长告予曰：此古战场也，尝覆三军。往往鬼哭，天阴则闻。伤心哉！秦欤？汉欤？将近代欤？",translation:"浩瀚啊！平坦的沙漠无边无际，远望看不见人，黄河像带子一样萦绕，群山错综起伏。暗淡啊凄惨伤神，风声悲凉日光昏黄。蓬草折断野草枯萎，寒冷得像有霜的早晨。鸟飞下来无处落脚，野兽狂奔失群。亭长告诉我说这是古战场，曾经有全军覆没。常常有鬼哭声，天阴就能听见。伤心啊！是秦时呢？汉时呢？大概是近代吧？",notes:[{w:"平沙无垠",m:"平坦的沙漠一望无际",t:"shi"},{w:"萦带",m:"像带子一样环绕",t:"shi"},{w:"徭戍",m:"征发徭役戍守边境",t:"shi"},{w:"夫",m:"发语词",t:"xu"},{w:"欤",m:"吗",t:"xu"}],quiz:[{q:"「徭戍」的意思是？",opts:["边疆城墙","征发徭役戍守边境","在中原作战","军队名称"],ans:1}]},
{id:"m8",title:"司马季主论卜",author:"刘基",dynasty:"明",dynastyZh:"明代",type:"论",length:"中篇",keyPoints:3,original:"东陵侯既废，过司马季主而卜焉。季主曰：君侯何卜也？东陵侯曰：久卧者思起，久蛰者思启，久懑者思嚏。吾闻之：蓄极则泄，极则达，热极则风，壅极则通。一冬一春，靡屈不伸，一起一伏，无往不复。仆窃有疑，愿受教焉！",translation:"东陵侯已经被废黜，去拜访司马季主占卜。司马季主说君侯为什么占卜呢？东陵侯说久卧不起的人想起床，久蛰不出的人想出来，久闷不畅的人想打喷嚏。我听说蓄积到了极点就会宣泄，极端就会通达，热到了极点就会生风，堵塞到了极点就会畅通。一冬一春，没有弯曲不伸展的，一起一伏，没有去而不返回的。我私下有疑惑，愿意接受您的指教！",notes:[{w:"既废",m:"已经被废黜",t:"shi"},{w:"蛰",m:"藏起来不出",t:"shi"},{w:"启",m:"出来，开启",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"于",m:"比",t:"xu"}],quiz:[{q:"「蓄极则泄，极则达」表达了什么哲学思想？",opts:["物极必反","天道酬勤","鬼神有灵","命运天定"],ans:0}]},
{id:"m9",title:"归去来辞",author:"陶渊明",dynasty:"明",dynastyZh:"明代",type:"辞",length:"中篇",keyPoints:5,original:"归去来兮，田园将芜胡不归？既自以心为形役，奚惆怅而独悲？悟已往之不谏，知来者之可追。实迷途其未远，觉今是而昨非。舟摇摇以轻扬，风飘飘而吹衣。问征夫以前路，恨晨光之熹微。乃瞻衡宇，载欣载奔。",translation:"回去吧！田园将要荒芜为什么不回去？既然自己让心被形体所役使，为什么还要惆怅独自悲伤？觉悟到过去的事情已经无法挽回，知道未来的事情还可以追求。实在是走入迷途还不算太远，醒悟到今天是正确的而昨天是错误的。船轻轻地摇曳着前进，风飘飘地吹动着衣衫。向行人问前面的路程，怨恨晨光微弱天色未明。终于看到自己的房屋，又高兴又奔跑。",notes:[{w:"归去来兮",m:"回去吧",t:"shi"},{w:"胡不归",m:"为什么不回去",t:"shi"},{w:"心为形役",m:"心被形体所役使",t:"shi"},{w:"奚",m:"为什么",t:"xu"},{w:"以",m:"而",t:"xu"},{w:"而",m:"却",t:"xu"}],quiz:[{q:"「归去来兮」是什么意思？",opts:["回来吧","回去吧，我不再做官了","快回去吧","我决定归隐"],ans:1}]},
{id:"m10",title:"徐文长传",author:"袁宏道",dynasty:"明",dynastyZh:"明代",type:"传",length:"长篇",keyPoints:4,original:"徐渭，字文长，为山阴诸生，声名籍甚。薛公蕙校越时，奇其才，有国士之目。然数奇，屡试辄蹶。中丞胡公宗宪闻之，客诸幕。文长每见，则葛衣乌巾，纵谈天下事；胡公大喜。是时公督数边兵，威镇东南；介冑之士，膝语蛇行，不敢举头，而文长以部下一诸生傲之。",translation:"徐渭，字文长，是山阴县的生员，名声很大。薛蕙公主持越地考试时，认为他的才能出众，把他看作国士。然而命运不好，屡次考试都失败。中丞胡宗宪听说了，把他请到幕府中做幕客。文长每次求见，就穿着麻布衣服戴着黑头巾，纵谈天下大事；胡公非常高兴。当时胡公统领几路兵马，威名镇慑东南；武士们跪着说话像蛇一样爬行，不敢抬头，而文长以一个部下的生员身份傲慢地对待他们。",notes:[{w:"诸生",m:"县学中的生员",t:"shi"},{w:"数奇",m:"命运不好，遭遇坎坷",t:"shi"},{w:"蹶",m:"跌倒，失败",t:"shi"},{w:"葛衣乌巾",m:"麻布衣服黑头巾",t:"shi"},{w:"以",m:"因为",t:"xu"},{w:"之",m:"的",t:"xu"}],quiz:[{q:"「数奇」在文中的意思是？",opts:["数学很好","命运不好","才能奇特","身体残疾"],ans:1}]},
{id:"m11",title:"泰州海陵县主簿许君墓志铭",author:"王安石",dynasty:"明",dynastyZh:"明代",type:"墓志铭",length:"中篇",keyPoints:3,original:"君讳平，字秉之，姓许氏。余尝谱其世家，所谓今泰州海陵县主簿者也。君既与兄元相友爱，称天下；而自少卓荦不羁，善辩说，与其兄俱以智略为当世大人所器。宝元时，朝廷开方略之选，以招天下异能之士。",translation:"许君名平，字秉之，姓许。我曾经编过他的家谱，他就是现在的泰州海陵县主簿，许君和兄长许元相互友爱，天下称颂；而且从小出众超群不受约束，善于辩论解说，和他兄长一起凭借智谋策略被当世大人器重。宝元年间，朝廷开设方略科选拔，来招纳天下有特殊才能的人。",notes:[{w:"讳",m:"名（对死者的尊敬说法）",t:"shi"},{w:"卓荦",m:"出众超群",t:"shi"},{w:"不羁",m:"不受约束",t:"shi"},{w:"器",m:"器重",t:"shi"},{w:"以",m:"因为/用来",t:"xu"},{w:"于",m:"在",t:"xu"}],quiz:[{q:"「君讳平」中「讳」是什么意思？",opts:["忌讳","名字（对死者名的尊称）","隐瞒","恭敬"],ans:1}]},
{id:"m12",title:"为徐敬业讨武曌檄",author:"骆宾王",dynasty:"明",dynastyZh:"明代",type:"檄文",length:"长篇",keyPoints:5,original:"伪临朝武氏者，性非和顺，地实寒微。昔充太宗下陈，曾以更衣入侍。洎乎晚节，秽乱春宫。潜隐先帝之私，阴图后房之嬖。入门见嫉，蛾眉不肯让人；掩袖工谗，狐媚偏能惑主。践元后于翚翟，陷吾君于聚麃。加以虺蜴为心，豺狼成性。近狎邪僻，残害忠良。杀姊屠兄，弑君鸩母。神人之所共嫉，天地之所不容。犹复包藏祸心，窥窃神器。君之爱子，幽之于别宫；贼之宗盟，委之以重任。鸣呼！霍子孟之不作，朱虚侯之已亡。燕啄皇孙，知汉祚之将尽。龙漦帝后，识夏庭之遽衰。" + "\n" + "敬业皇唐旧臣，公侯冢子。奉先帝之成业，荷本朝之厚恩。宋微子之兴悲，良有以也；袁君山之流涕，岂徒然哉！是用气愤风云，志安社稷。因天下之失望，顺宇内之推心。爰举义旗，以清妖孽。" + "\n" + "南连百越，北尽三河；铁骑成群，玉轴相接。海陵红粟，仓储之积靡穷；江浦黄旗，匡复之功何远！班声动而北风起，剑气冲而南斗平。喑呜则山岳崩颓，叱吒则风云变色。以此制敌，何敌不摧？以此图功，何功不克？" + "\n" + "公等或居汉地，或协周亲；或膺重寄于话言，或受顾命于宣室。言犹在耳，忠岂忘心。一抔之土未干，六尺之孤何托？倘能转祸为福，送往事居，共立勤王之勋，无废大君之命，凡诸爵赏，同指山河。若其眷恋穷城，徘徊歧路，坐昧先几之兆，必贻后至之诛。请看今日之域中，竟是谁家之天下！" + "\n" + "上一篇目　录",translation:"窃取政权治理天下的武氏，性情实际上并不温和柔顺，出身实在寒微。从前充当太宗的后宫列女，曾因侍奉皇帝更衣而得幸。到了晚年，在太子宫中淫乱。隐瞒掩盖先帝对她的宠爱，暗中图谋在后宫获得宠爱。入宫就被人嫉妒，却不肯让人；善于用袖遮住嘴巴说坏话，用狐媚手段偏偏能够迷惑君主。登上皇后的宝座，使我们的君主陷入混乱。加之以毒蛇般的心肠，豺狼般的性格。",notes:[{w:"伪临朝",m:"窃取政权治理天下",t:"shi"},{w:"更衣",m:"侍奉皇帝更换衣服，借指得幸",t:"shi"},{w:"春宫",m:"太子宫",t:"shi"},{w:"阴图",m:"暗中图谋",t:"shi"},{w:"元后",m:"皇后",t:"shi"},{w:"虺蜴",m:"毒蛇和蜥蜴",t:"shi"},{w:"神器",m:"帝位",t:"shi"},{w:"之",m:"取独",t:"xu"},{w:"于",m:"在/到",t:"xu"}],quiz:[{q:"武曌是谁？",opts:["武则天","武媚娘","武则天给自己造的字","武则天的乳名"],ans:2}]}
];

const POETRY_DATA = [
{id:"po1",title:"关雎",author:"《诗经》",dynasty:"周",dynastyZh:"西周/春秋",type:"诗",length:"短篇",keyPoints:3,original:"关关雎鸠，在河之洲。窈窕淑女，君子好逑。参差荇菜，左右流之。窈窕淑女，寤寐求之。求之不得，寤寐思服。悠哉悠哉，辗转反侧。参差荇菜，左右采之。窈窕淑女，琴瑟友之。参差荇菜，左右芼之。窈窕淑女，钟鼓乐之。",translation:"关关鸣叫的雎鸠，栖息在河中的小岛上。美丽贤淑的女子，是君子的好配偶。长长短短的荇菜，左右两边去求取它。美丽贤淑的女子，醒着睡着都想要追求她。追求不到，醒着睡着都思念她。思念啊思念啊，翻来覆去睡不着。长长短短的荇菜，左右两边去采摘它。美丽贤淑的女子，弹琴鼓瑟来亲近她。长长短短的荇菜，左右两边去挑选它。美丽贤淑的女子，敲钟打鼓来取悦她。",notes:[{w:"关关",m:"鸟鸣声",t:"shi"},{w:"雎鸠",m:"一种水鸟",t:"shi"},{w:"窈窕",m:"内心仪表美好",t:"shi"},{w:"淑女",m:"善良美好的女子",t:"shi"},{w:"好逑",m:"好的配偶",t:"shi"},{w:"参差",m:"长短不齐",t:"shi"},{w:"荇菜",m:"一种水生植物",t:"shi"},{w:"流",m:"求取",t:"shi"},{w:"寤寐",m:"醒着和睡着",t:"shi"},{w:"辗转",m:"翻来覆去",t:"shi"},{w:"友",m:"亲近",t:"shi"},{w:"乐",m:"使快乐",t:"shi"},{w:"之",m:"无实义",t:"xu"}],quiz:[{q:"「窈窕淑女」中「窈窕」的意思是？",opts:["身材苗条","内心仪表美好","善良贤惠","美丽大方"],ans:1},{q:"「君子好逑」中「逑」的意思是？",opts:["追求","配偶","朋友","好的"],ans:1}]},
{id:"po2",title:"蒹葭",author:"《诗经》",dynasty:"周",dynastyZh:"西周/春秋",type:"诗",length:"短篇",keyPoints:3,original:"蒹葭苍苍，白露为霜。所谓伊人，在水一方。溯洄从之，道阻且长。溯游从之，宛在水中央。蒹葭萋萋，白露未晞。所谓伊人，在水之湄。溯洄从之，道阻且跻。溯游从之，宛在水中坻。",translation:"芦苇茂盛密集，露水凝结成霜。我所思念的那个人，在河水的那一边。逆流而上去追寻她，道路险阻而且漫长。顺流而下去追寻她，她仿佛就在水中央。芦苇凄清茂盛，露水还没有干。我所思念的那个人，在河水的岸边。逆流而上去追寻她，道路险阻而且高峻。顺流而下去追寻她，她仿佛就在水中的小岛上。",notes:[{w:"蒹葭",m:"芦苇",t:"shi"},{w:"伊人",m:"那个人",t:"shi"},{w:"溯洄",m:"逆流而上",t:"shi"},{w:"溯游",m:"顺流而下",t:"shi"},{w:"道阻",m:"道路险阻",t:"shi"},{w:"宛",m:"仿佛",t:"shi"},{w:"湄",m:"岸边",t:"shi"},{w:"坻",m:"水中的小岛",t:"shi"},{w:"之",m:"无实义",t:"xu"}],quiz:[{q:"「所谓伊人，在水一方」表达了什么感情？",opts:["悲伤","思念与追求而不可得","喜悦","愤怒"],ans:1}]},
{id:"po3",title:"《论语》十二则",author:"孔子",dynasty:"先秦",dynastyZh:"先秦",type:"语录",length:"短篇",keyPoints:5,original:"子曰：学而时习之，不亦说乎？有朋自远方来，不亦乐乎？人不知而不愠，不亦君子乎？曾子曰：吾日三省吾身：为人谋而不忠乎？与朋友交而不信乎？传不习乎？子曰：温故而知新，可以为师矣。子曰：学而不思则罔，思而不学则殆。子曰：三人行，必有我师焉。",translation:"孔子说：学习了知识时常复习它，不也很快乐吗？有志同道合的朋友从远方来，不也很高兴吗？别人不了解我却不怨恨，不也是君子吗？曾子说：我每天多次反省自己：为别人办事是否尽心竭力了？与朋友交往是否诚实可信？老师传授的知识是否复习了？孔子说：温习旧知识从而获得新知识，凭这一点就可以做老师了。孔子说：只学习不思考，就会迷惑；只思考不学习，就会有害。",notes:[{w:"时习",m:"时常复习",t:"shi"},{w:"说",m:"通悦，愉快",t:"shi"},{w:"愠",m:"怨恨",t:"shi"},{w:"三省",m:"多次反省自己",t:"shi"},{w:"忠",m:"尽心竭力",t:"shi"},{w:"信",m:"诚实",t:"shi"},{w:"罔",m:"迷惑",t:"shi"},{w:"殆",m:"有害",t:"shi"},{w:"之",m:"它",t:"xu"},{w:"而",m:"却",t:"xu"},{w:"于",m:"对/比",t:"xu"}],quiz:[{q:"「学而时习之，不亦说乎」中「说」的意思是？",opts:["说话","通悦，愉快","学习","老师"],ans:1},{q:"「吾日三省吾身」的「三省」正确解释是？",opts:["三次反省","每天反省三次","多次反省自己","每天检查三次"],ans:2}]},
{id:"po4",title:"曹刿论战",author:"《左传》",dynasty:"先秦",dynastyZh:"先秦",type:"论",length:"中篇",keyPoints:5,original:"十年春，齐师伐我。公将战。曹刿请见。其乡人曰：肉食者谋之，又何间焉？刿曰：肉食者鄙，未能远谋。遂入见。问：何以战？公曰：衣食所安，弗敢专也，必以分人。对曰：小惠未遍，民弗从也。公曰：小大之狱，虽不能察，必以情。对曰：忠之属也。可以一战。战则请从。",translation:"鲁庄公十年的春天，齐国军队攻打我们鲁国。曹刿请求拜见鲁庄公。他的同乡说当权者会谋划这件事，你又何必参与呢？曹刿说当权者见识浅陋，不能作长远谋划。于是进入朝堂拜见鲁庄公。曹刿问凭什么条件作战？鲁庄公说衣服食物我不敢独自享用，一定把它们分给别人。曹刿回答说小恩小惠不能普遍惠及百姓，百姓不会跟从的。鲁庄公说大大小小的诉讼案件，即使不能一一明察，一定根据实情处理。曹刿回答说这是尽心尽力为人民办事的一类事情，可以凭借这个条件打一仗。",notes:[{w:"师",m:"军队",t:"shi"},{w:"伐",m:"攻打",t:"shi"},{w:"肉食者",m:"当权者",t:"shi"},{w:"间",m:"参与",t:"shi"},{w:"鄙",m:"见识浅陋",t:"shi"},{w:"专",m:"独自享用",t:"shi"},{w:"牺牲",m:"祭祀用的牛羊",t:"shi"},{w:"信",m:"诚信",t:"shi"},{w:"狱",m:"诉讼案件",t:"shi"},{w:"情",m:"实情",t:"shi"},{w:"忠",m:"尽心尽力",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"以",m:"凭借",t:"xu"}],quiz:[{q:"曹刿认为作战的先决条件是？",opts:["有足够的兵力","得到神的保佑","小大之狱必以情","国君的英明决策"],ans:2}]},
{id:"po5",title:"鱼我所欲也",author:"《孟子》",dynasty:"先秦",dynastyZh:"先秦",type:"论",length:"中篇",keyPoints:4,original:"鱼，我所欲也；熊掌，亦我所欲也。二者不可得兼，舍鱼而取熊掌者也。生，亦我所欲也；义，亦我所欲也。二者不可得兼，舍生而取义者也。生亦我所欲，所欲有甚于生者，故不为苟得也；死亦我所恶，所恶有甚于死者，故患有所不避也。",translation:"鱼，是我想要的东西；熊掌，也是我想要的东西。如果两样东西不能同时得到，我就放弃鱼而要熊掌。生命是我想要的东西，道义也是我想要的东西。如果两样东西不能同时得到，我就放弃生命而选取道义。生命是我想要的东西，但我所想要的有比生命更重要的，所以我不苟且偷生；死亡是我所厌恶的，但我所厌恶的有比死亡更严重的，所以祸患有时尚且不躲避。",notes:[{w:"所欲",m:"想要的东西",t:"shi"},{w:"熊掌",m:"熊的脚掌",t:"shi"},{w:"兼",m:"同时",t:"shi"},{w:"苟得",m:"苟且求得",t:"shi"},{w:"所恶",m:"厌恶的东西",t:"shi"},{w:"患",m:"祸患",t:"shi"},{w:"甚于生",m:"比生命更重要的",t:"shi"},{w:"之",m:"无实义",t:"xu"},{w:"于",m:"比",t:"xu"}],quiz:[{q:"「舍生而取义」中「义」指的是？",opts:["道义","正当的事","正义的事情","仁义的事情"],ans:0},{q:"本段的中心论点是？",opts:["生命比道义重要","当生命和道义冲突时，应当舍生取义","人不应该苟且偷生","要学会取舍"],ans:1}]},
{id:"po6",title:"富贵不能淫",author:"《孟子》",dynasty:"先秦",dynastyZh:"先秦",type:"论",length:"中篇",keyPoints:3,original:"居天下之广居，立天下之正位，行天下之大道；得志，与民由之；不得志，独行其道。富贵不能淫，贫贱不能移，威武不能屈，此之谓大丈夫。",translation:"居住在天下最宽广的住宅（仁）里，站在天下最正确的位置（礼）上，走在天下最光明的大道（义）上；得志时，同百姓一起实行它；不得志时，独自实行自己的道。富贵不能使他迷惑，贫贱不能使他动摇，威武不能使他屈服这就叫做大丈夫。",notes:[{w:"广居",m:"最宽广的住宅，指仁",t:"shi"},{w:"正位",m:"最正确的位置，指礼",t:"shi"},{w:"大道",m:"最光明的大道，指义",t:"shi"},{w:"淫",m:"迷惑",t:"shi"},{w:"移",m:"动摇",t:"shi"},{w:"屈",m:"屈服",t:"shi"},{w:"之",m:"它",t:"xu"}],quiz:[{q:"「富贵不能淫」的正确翻译是？",opts:["富贵不能淫乱","富贵不能使他迷惑","富贵不能浪费","富贵不能享受"],ans:1}]},
{id:"po7",title:"生于忧患，死于安乐",author:"《孟子》",dynasty:"先秦",dynastyZh:"先秦",type:"论",length:"中篇",keyPoints:4,original:"舜发于畎亩之中，傅说举于版筑之间，胶鬲举于鱼盐之中，管夷吾举于士，孙叔敖举于海，百里奚举于市。故天将降大任于是人也，必先苦其心志，劳其筋骨，饿其体肤，空乏其身，行拂乱其所为，所以动心忍性，曾益其所不能。",translation:"舜从田野中被起用，傅说从筑墙的劳作中被选用，胶鬲从鱼盐业中被选用，管夷吾从狱官手里被释放而选用，孙叔敖从海边被选用，百里奚从集市被选用。所以上天要把重大使命交给这个人，一定要先使他的心意苦恼，使他的筋骨劳累，使他的身体饥饿，使他身受穷困之苦，用来触动他的心神，坚忍他的性格，增加他原本没有的能力。",notes:[{w:"发",m:"被起用了",t:"shi"},{w:"举",m:"被选用",t:"shi"},{w:"畎亩",m:"田地",t:"shi"},{w:"版筑",m:"筑墙的工作",t:"shi"},{w:"苦",m:"使苦恼",t:"shi"},{w:"劳",m:"使劳累",t:"shi"},{w:"饿",m:"使饥饿",t:"shi"},{w:"空乏",m:"使穷困",t:"shi"},{w:"动心忍性",m:"触动他的心神，坚忍他的性格",t:"shi"},{w:"曾益",m:"增加",t:"shi"},{w:"于",m:"从/在",t:"xu"}],quiz:[{q:"本段开头的排列例子，用了什么修辞手法？",opts:["比喻","排比","对偶","反复"],ans:1}]},
{id:"po8",title:"天时不如地利",author:"《孟子》",dynasty:"先秦",dynastyZh:"先秦",type:"论",length:"短篇",keyPoints:3,original:"天时不如地利，地利不如人和。三里之城，七里之郭，环而攻之而不胜。夫环而攻之，必有得天时者矣；然而不胜者，是天时不如地利也。城非不高也，池非不深也，兵革非不坚利也，米粟非不多也；委而去之，是地利不如人和也。",translation:"有利的时令比不上有利的地势，有利的地势比不上人心所向。三里大小的内城，七里大小的外城，包围起来攻打它却不能取胜。城墙不是不高，护城河不是不深，武器装备不是不精良，粮食不是不多；弃城离开，这是因为有利的地势比不上人心所向。",notes:[{w:"天时",m:"有利的时令",t:"shi"},{w:"地利",m:"有利的地势",t:"shi"},{w:"人和",m:"人心所向",t:"shi"},{w:"城",m:"城墙",t:"shi"},{w:"池",m:"护城河",t:"shi"},{w:"兵革",m:"武器装备",t:"shi"},{w:"委",m:"丢弃",t:"shi"},{w:"而",m:"却",t:"xu"},{w:"之",m:"它",t:"xu"},{w:"于",m:"比",t:"xu"}],quiz:[{q:"本段的中心论点是？",opts:["天时最重要","地利最重要","人和最重要","三者同等重要"],ans:2}]},
{id:"po9",title:"邹忌讽齐王纳谏",author:"《战国策》",dynasty:"先秦",dynastyZh:"先秦",type:"记",length:"长篇",keyPoints:4,original:"邹忌修八尺有余，而形貌昳丽。朝服衣冠，窥镜，谓其妻曰：我孰与城北徐公美？其妻曰：君美甚，徐公何能及君也！城北徐公，齐国之美丽者也。忌不自信，而复问其妾，曰：吾与徐公孰美？妾曰：徐公何能及君也！旦日，客从外来，与坐谈，问之：吾与徐公孰美？客曰：徐公不若君之美也。",translation:"邹忌身高八尺多，而且容貌俊美。早晨穿戴好衣帽，照着镜子，对他的妻子说我与城北徐公相比谁美？他的妻子说您美极了，徐公怎么能比得上您呢！城北徐公是齐国的美男子。邹忌不相信自己，又问他的妾说我与徐公谁美？妾说徐公怎么能比得上您呢！第二天，有客人从外面来，邹忌与他坐着谈话，问他我与徐公谁美？客人说徐公不如您美。",notes:[{w:"修",m:"长，这里指身高",t:"shi"},{w:"昳丽",m:"容貌光艳美丽",t:"shi"},{w:"服衣冠",m:"穿戴好衣帽",t:"shi"},{w:"孰与",m:"与……相比谁",t:"shi"},{w:"信",m:"相信",t:"shi"},{w:"旦日",m:"第二天",t:"shi"},{w:"若",m:"如，像",t:"shi"},{w:"之",m:"的",t:"xu"},{w:"与",m:"和/跟",t:"xu"}],quiz:[{q:"邹忌从家事、国事、天下事的类比中得到了什么结论？",opts:["自己要谦虚","王者应广开言路","要善于纳谏","身边的人都会说谎"],ans:1}]},
{id:"po10",title:"十五从军征",author:"《乐府诗集》",dynasty:"汉",dynastyZh:"汉/南北朝",type:"乐府",length:"中篇",keyPoints:3,original:"十五从军征，八十始得归。道逢乡里人：家中有阿谁？遥看是君家，松柏冢累累。兔从狗窦入，雉从梁上飞。中庭生旅谷，井上生旅葵。舂谷持作饭，采葵持作羹。羹饭一时熟，不知贻阿谁。出门东向看，泪落沾我衣。",translation:"十五岁就参军远征，八十岁才得以归来。路上遇见同乡的人，问家里还有谁？回答说远远看去那就是你的家，松树柏树坟墓重重叠叠。野兔从狗洞钻进家，野鸡从屋梁上飞起。庭院中生长着野谷，井边生长着野葵。捣去谷皮做成饭，采摘葵叶煮成汤。汤和饭一会儿就熟了，却不知道送给谁吃。出门向东张望，眼泪落下沾湿了我的衣裳。",notes:[{w:"从军征",m:"参军远征",t:"shi"},{w:"始得归",m:"才得以归来",t:"shi"},{w:"阿谁",m:"谁",t:"shi"},{w:"冢",m:"坟墓",t:"shi"},{w:"旅谷",m:"野谷",t:"shi"},{w:"舂",m:"捣去谷皮",t:"shi"},{w:"贻",m:"送给",t:"shi"},{w:"沾",m:"打湿",t:"shi"}],quiz:[{q:"这首诗反映了什么主题？",opts:["战争的荣耀","从军征战的艰辛与家人的离乱","军队的纪律严明","边塞风光"],ans:1}]},
{id:"po11",title:"观沧海",author:"曹操",dynasty:"汉",dynastyZh:"汉/南北朝",type:"诗",length:"短篇",keyPoints:3,original:"东临碣石，以观沧海。水何澹澹，山岛竦峙。树木丛生，百草丰茂。秋风萧瑟，洪波涌起。日月之行，若出其中；星汉灿烂，若出其里。幸甚至哉，歌以咏志。",translation:"向东登上碣石山，来观看那茫茫的大海。海水波涛荡漾，山岛高高地耸立。树木密密麻麻地生长，百草十分丰美茂盛。秋风吹来萧瑟的声音，巨大的波浪汹涌而起。太阳和月亮的运行，好像从这海中升起；银河星光灿烂，好像从这海里涌出。庆幸得很啊，用这首歌来表达我的志向。",notes:[{w:"碣石",m:"山名",t:"shi"},{w:"沧海",m:"大海",t:"shi"},{w:"澹澹",m:"水波荡漾的样子",t:"shi"},{w:"竦峙",m:"高高地耸立",t:"shi"},{w:"星汉",m:"银河",t:"shi"},{w:"咏志",m:"表达志向",t:"shi"}],quiz:[{q:"「水何澹澹」中「澹澹」的意思是？",opts:["水很浑浊","水波荡漾的样子","水很平静","水很深"],ans:1},{q:"这首诗表达了作者什么情怀？",opts:["思乡之情","建功立业的壮志","隐居山林的志趣","离别之情"],ans:1}]},
{id:"po12",title:"饮酒（其五）",author:"陶渊明",dynasty:"汉",dynastyZh:"汉/南北朝",type:"诗",length:"短篇",keyPoints:4,original:"结庐在人境，而无车马喧。问君何能尔？心远地自偏。采菊东篱下，悠然见南山。山气日夕佳，飞鸟相与还。此中有真意，欲辨已忘言。",translation:"把房屋建造在人间聚居的地方，却没有车马的喧闹。问我为什么能这样？心远离尘世，所居之地自然就偏僻了。在东篱下采摘菊花，悠闲地抬起头看见南山。傍晚的山间气息非常美好，飞鸟成群地归来。这里面有人生的真意，想要分辨清楚，却已经忘记了该怎样表达。",notes:[{w:"结庐",m:"建造房屋",t:"shi"},{w:"车马喧",m:"车马喧闹的声音",t:"shi"},{w:"尔",m:"这样",t:"shi"},{w:"悠然",m:"悠闲的样子",t:"shi"},{w:"日夕",m:"傍晚",t:"shi"},{w:"相与还",m:"成群结队地归来",t:"shi"},{w:"辨",m:"分辨",t:"shi"}],quiz:[{q:"「采菊东篱下，悠然见南山」中「见」字妙在哪里？",opts:["说明菊花很多","无意识地映入眼帘，体现悠闲心境","表现菊花美丽","说明南山很近"],ans:1}]},
{id:"po13",title:"木兰诗",author:"《乐府诗集》",dynasty:"汉",dynastyZh:"汉/南北朝",type:"乐府",length:"长篇",keyPoints:5,original:"唧唧复唧唧，木兰当户织。不闻机杼声，唯闻女叹息。问女何所思，问女何所忆。女亦无所思，女亦无所忆。昨夜见军帖，可汗大点兵，军书十二卷，卷卷有爷名。阿爷无大儿，木兰无长兄，愿为市鞍马，从此替爷征。",translation:"织机发出唧唧的声音，木兰对着门织布。听不到织布机的声音，只听到女孩的叹息。问女孩在想什么，问女孩在思念什么。女孩也没有想什么，也没有思念什么。昨晚看到军中的文告，可汗大规模征兵，征兵名册有很多卷，每一卷都有父亲的名字。父亲没有大儿子，木兰没有兄长，愿意为此去买马鞍和马匹，从此代替父亲去出征。",notes:[{w:"唧唧",m:"织布机的声音",t:"shi"},{w:"机杼",m:"织布机",t:"shi"},{w:"军帖",m:"军中的文告",t:"shi"},{w:"可汗",m:"古代北方少数民族君主",t:"shi"},{w:"军书",m:"征兵的名册",t:"shi"},{w:"市",m:"买",t:"shi"},{w:"替爷征",m:"代替父亲出征",t:"shi"}],quiz:[{q:"木兰代父从军的原因是什么？",opts:["想要建功立业","父亲没有大儿子，木兰没有兄长","国家强制要求","对战争的向往"],ans:1}]},
{id:"po14",title:"送杜少府之任蜀州",author:"王勃",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"城阙辅三秦，风烟望五津。与君离别意，同是宦游人。海内存知己，天涯若比邻。无为在歧路，儿女共沾巾。",translation:"长安城以三秦为护卫，遥望风烟迷茫中的五津。与你离别的心情相同，因为我们都是在外做官的人。只要四海之内有知心的朋友，即使远在天涯也像近邻。不要在分手的路口，像小儿女那样让泪水沾湿了手巾。",notes:[{w:"城阙",m:"长安城",t:"shi"},{w:"三秦",m:"长安周围的地区",t:"shi"},{w:"五津",m:"蜀地，泛指四川",t:"shi"},{w:"宦游",m:"在外做官",t:"shi"},{w:"海内",m:"四海之内",t:"shi"},{w:"天涯",m:"天边",t:"shi"},{w:"比邻",m:"近邻",t:"shi"},{w:"歧路",m:"分手的路口",t:"shi"},{w:"沾巾",m:"沾湿手巾",t:"shi"}],quiz:[{q:"「海内存知己，天涯若比邻」表达了什么感情？",opts:["离别的悲伤","知己情谊不受距离影响，乐观旷达","对友人的责备","对故乡的思念"],ans:1}]},
{id:"po15",title:"登幽州台歌",author:"陈子昂",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"前不见古人，后不见来者。念天地之悠悠，独怆然而涕下。",translation:"往前看不见古代的贤君，往后不见后世的明主。想到天地广阔无边无尽，独自感伤地流下眼泪。",notes:[{w:"幽州台",m:"蓟北楼",t:"shi"},{w:"古人",m:"古代的贤君",t:"shi"},{w:"来者",m:"后世的明主",t:"shi"},{w:"悠悠",m:"无穷无尽的样子",t:"shi"},{w:"怆然",m:"伤感的样子",t:"shi"},{w:"涕",m:"眼泪",t:"shi"}],quiz:[{q:"这首诗表达了诗人什么感情？",opts:["游览山水的快乐","怀才不遇、孤独寂寞的悲愤","对友人的思念","对故乡的眷恋"],ans:1}]},
{id:"po16",title:"次北固山下",author:"王湾",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"客路青山外，行舟绿水前。潮平两岸阔，风正一帆悬。海日生残夜，江春入旧年。乡书何处达？归雁洛阳边。",translation:"要去的地方还在青山之外，江水环绕着小舟向前行驶。潮水涨满，江面显得更宽阔，顺风把帆高高悬起。残夜未尽，太阳已从海上升起；旧年未完，江上已有了春天的气息。家信该寄到哪里呢？就拜托给飞回洛阳的鸿雁吧。",notes:[{w:"次",m:"停泊",t:"shi"},{w:"客路",m:"要去的路",t:"shi"},{w:"潮平",m:"潮水涨满",t:"shi"},{w:"风正",m:"顺风",t:"shi"},{w:"残夜",m:"夜未尽",t:"shi"},{w:"旧年",m:"旧的一年",t:"shi"},{w:"乡书",m:"家信",t:"shi"},{w:"归雁",m:"飞回北方的雁",t:"shi"}],quiz:[{q:"「海日生残夜，江春入旧年」妙在哪里？",opts:["写景优美","景物描写生动","时序交替，蕴含哲理","对仗工整"],ans:2}]},
{id:"po17",title:"使至塞上",author:"王维",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:4,original:"单车欲问边，属国过居延。征蓬出汉塞，归雁入胡天。大漠孤烟直，长河落日圆。萧关逢候骑，都护在燕然。",translation:"轻车去慰问边关，经过居延属国。像蓬草飘出塞外，像归雁飞入胡天。广大沙漠中一缕孤烟直直地升起，黄河边上落日圆圆的。萧关遇到侦察的骑兵，都护在燕然前线。",notes:[{w:"单车",m:"轻车简从",t:"shi"},{w:"属国",m:"附庸国，这里指边塞",t:"shi"},{w:"居延",m:"地名，在今甘肃",t:"shi"},{w:"征蓬",m:"飘飞的蓬草",t:"shi"},{w:"孤烟",m:"一缕烟",t:"shi"},{w:"候骑",m:"侦察的骑兵",t:"shi"},{w:"都护",m:"边塞的最高武官",t:"shi"},{w:"燕然",m:"山名，借指前线",t:"shi"}],quiz:[{q:"「大漠孤烟直，长河落日圆」妙在哪里？",opts:["写景壮阔而意境孤独","对仗工整","用词精准","情感深沉"],ans:0}]},
{id:"po18",title:"闻王昌龄左迁龙标遥有此寄",author:"李白",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"杨花落尽子规啼，闻道龙标过五溪。我寄愁心与明月，随风直到夜郎西。",translation:"杨花落尽了，子规鸟在啼叫，听说你被贬到龙标去了，还要过五溪。我把忧愁的心寄托给明月，随风一直送到夜郎西边。",notes:[{w:"子规",m:"杜鹃鸟",t:"shi"},{w:"左迁",m:"贬官",t:"shi"},{w:"龙标",m:"地名，今湖南黔阳",t:"shi"},{w:"五溪",m:"地名，在今湖南西部",t:"shi"},{w:"夜郎",m:"地名，在今贵州",t:"shi"},{w:"与",m:"给",t:"xu"}],quiz:[{q:"「我寄愁心与明月」用了什么手法？",opts:["比喻","拟人","借景抒情","用典"],ans:2}]},
{id:"po19",title:"行路难（其一）",author:"李白",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"中篇",keyPoints:4,original:"金樽清酒斗十千，玉盘珍羞直万钱。停杯投箸不能食，拔剑四顾心茫然。欲渡黄河冰塞川，将登太行雪满山。闲来垂钓碧溪上，忽复乘舟梦日边。行路难，行路难，多歧路，今安在？长风破浪会有时，直挂云帆济沧海。",translation:"金杯中的清酒一斗值十千钱，玉盘里的珍贵菜肴值得万钱。放下酒杯丢下筷子吃不下，拔出剑来四下环顾心里一片茫然。想要渡过黄河，冰冻封住了河流；想要登上太行山，大雪堆满了山。空闲时在水边垂钓，忽然又梦见乘船经过太阳旁边。行路难啊行路难，岔路那么多，我的出路在哪里？总有一天会乘长风破万里浪，挂起云帆渡过大海。",notes:[{w:"清酒",m:"清醇的酒",t:"shi"},{w:"箸",m:"筷子",t:"shi"},{w:"茫然",m:"一片惘然的样子",t:"shi"},{w:"歧路",m:"岔路",t:"shi"},{w:"云帆",m:"高大的帆",t:"shi"},{w:"济",m:"渡过",t:"shi"},{w:"沧海",m:"大海",t:"shi"}],quiz:[{q:"「长风破浪会有时，直挂云帆济沧海」表达了什么？",opts:["对航海事业的向往","对未来的乐观和信心","对大海的赞美","对友人的祝福"],ans:1}]},
{id:"po20",title:"黄鹤楼",author:"崔颢",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:4,original:"昔人已乘黄鹤去，此地空余黄鹤楼。黄鹤一去不复返，白云千载空悠悠。晴川历历汉阳树，芳草萋萋鹦鹉洲。日暮乡关何处是？烟波江上使人愁。",translation:"过去的仙人已经驾着黄鹤飞走了，这里只剩下黄鹤楼。黄鹤一飞去再不回还，白云千年来空自飘荡。晴天遥望对岸汉阳的树木清晰可见，芳草茂盛地生长在鹦鹉洲上。太阳西沉我的故乡在哪里？烟波浩渺的长江使人忧愁。",notes:[{w:"昔人",m:"过去的仙人",t:"shi"},{w:"空悠悠",m:"空自飘荡",t:"shi"},{w:"历历",m:"清晰分明的样子",t:"shi"},{w:"萋萋",m:"草茂盛的样子",t:"shi"},{w:"鹦鹉洲",m:"长江中的小岛",t:"shi"},{w:"乡关",m:"故乡",t:"shi"},{w:"烟波",m:"烟霭笼罩的水面",t:"shi"}],quiz:[{q:"这首诗的意境和情感是？",opts:["游览山水的快乐","吊古伤今，思乡之情","边塞的荒凉","田园生活的情趣"],ans:1}]},
{id:"po21",title:"望岳",author:"杜甫",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"岱宗夫如何？齐鲁青未了。造化钟神秀，阴阳割昏晓。荡胸生层云，决眦入归鸟。会当凌绝顶，一览众山小。",translation:"东岳泰山怎么样？青色覆盖了齐鲁大地，无边无际。大自然聚集了神奇秀丽的景色，山南山北明暗不同。层云生起，涤荡心胸，睁大眼睛看那归巢的飞鸟。一定要登上泰山的顶峰，俯瞰群山，它们都显得很渺小。",notes:[{w:"岱宗",m:"泰山",t:"shi"},{w:"齐鲁",m:"今山东地区",t:"shi"},{w:"造化",m:"大自然",t:"shi"},{w:"钟",m:"聚集",t:"shi"},{w:"阴阳",m:"山北为阴，山南为阳",t:"shi"},{w:"决眦",m:"睁大眼睛",t:"shi"},{w:"会当",m:"一定要",t:"shi"},{w:"凌",m:"登上",t:"shi"}],quiz:[{q:"「会当凌绝顶，一览众山小」表达了什么？",opts:["登山的艰辛","诗人的壮志和抱负","对泰山的赞美","对自然的热爱"],ans:1}]},
{id:"po22",title:"春望",author:"杜甫",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:4,original:"国破山河在，城春草木深。感时花溅泪，恨别鸟惊心。烽火连三月，家书抵万金。白头搔更短，浑欲不胜簪。",translation:"国家破碎了，山河还在；春天城里草木很深。感伤时事，花也溅泪；怅恨离别，鸟也惊心。战火连续三个月不断，一封家信抵得上万两黄金。头发白了越搔越短，简直插不住簪子了。",notes:[{w:"国破",m:"国家破碎",t:"shi"},{w:"城春",m:"春天城里",t:"shi"},{w:"感时",m:"感伤时事",t:"shi"},{w:"烽火",m:"战火",t:"shi"},{w:"抵",m:"抵得上",t:"shi"},{w:"白头",m:"白发",t:"shi"},{w:"簪",m:"束发的簪子",t:"shi"}],quiz:[{q:"这首诗反映了什么历史背景？",opts:["开元盛世","安史之乱","贞观之治","三国鼎立"],ans:1}]},
{id:"po23",title:"茅屋为秋风所破歌",author:"杜甫",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"长篇",keyPoints:3,original:"八月秋高风怒号，卷我屋上三重茅。茅飞渡江洒江郊，高者挂罥长林梢，下者飘转沉塘坳。布衾多年冷似铁，娇儿恶卧踏里裂。床头屋漏无干处，雨脚如麻未断绝。自经丧乱少睡眠，长夜沾湿何由彻！安得广厦千万间，大庇天下寒士俱欢颜！",translation:"八月深秋大风怒号，卷走我屋顶上三层茅草。茅草飞过江去洒在江边，高的挂在树林梢上，低的旋转着落入池塘。布被子用了多年冷得像铁，孩子睡相不好蹬裂了。被头部漏雨没有一处是干的，雨像麻线一样下个不停。自从遭乱就没有睡好过，漫漫雨夜湿漉漉的怎能熬到天亮！怎样才能得到千万间宽敞的大屋，普遍遮蔽天下贫寒的读书人，让他们都露出笑脸！",notes:[{w:"秋高",m:"深秋",t:"shi"},{w:"三重茅",m:"多层茅草",t:"shi"},{w:"罥",m:"挂",t:"shi"},{w:"布衾",m:"布被子",t:"shi"},{w:"丧乱",m:"战乱",t:"shi"},{w:"广厦",m:"宽敞的大屋",t:"shi"},{w:"庇",m:"遮蔽",t:"shi"},{w:"寒士",m:"贫寒的读书人",t:"shi"}],quiz:[{q:"「安得广厦千万间，大庇天下寒士俱欢颜」表达了什么？",opts:["对个人住房的渴望","推己及人的博大情怀","对建筑的赞赏","对财富的向往"],ans:1}]},
{id:"po24",title:"白雪歌送武判官归京",author:"岑参",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"中篇",keyPoints:3,original:"北风卷地白草折，胡天八月即飞雪。忽如一夜春风来，千树万树梨花开。散入珠帘湿罗幕，狐裘不暖锦衾薄。将军角弓不得控，都护铁衣冷难着。",translation:"北风卷地而来，白草被吹折了，胡地的天空八月就飘起雪花。就像一夜之间春风吹来，千树万树的梨花都绽开了。花瓣散入珠帘打湿了绫罗帷幕，狐皮袍子不暖和锦缎被子也显得单薄了。将军拉不开角弓，铁甲冰冷难以穿上。",notes:[{w:"白草",m:"西北的一种草",t:"shi"},{w:"胡天",m:"西北的天空",t:"shi"},{w:"珠帘",m:"用珠子穿成的帘子",t:"shi"},{w:"罗幕",m:"丝织的帷幕",t:"shi"},{w:"狐裘",m:"狐皮袍子",t:"shi"},{w:"锦衾",m:"锦缎被子",t:"shi"},{w:"角弓",m:"用兽角装饰的弓",t:"shi"},{w:"铁衣",m:"冰冷的铠甲",t:"shi"}],quiz:[{q:"「忽如一夜春风来，千树万树梨花开」妙在哪里？",opts:["写春天景色","以梨花喻雪，奇特壮美","写宴会热闹","表现诗人喜悦"],ans:1}]},
{id:"po25",title:"酬乐天扬州初逢席上见赠",author:"刘禹锡",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"巴山楚水凄凉地，二十三年弃置身。怀旧空吟闻笛赋，到乡翻似烂柯人。沉舟侧畔千帆过，病树前头万木春。今日听君歌一曲，暂凭杯酒长精神。",translation:"在巴山楚水这些凄凉的地方，我被弃置在这荒远之地二十三年。怀念故人只能白白吟诵《思旧赋》，回到家乡倒像那个烂柯人，恍如隔世。沉船旁边有千帆驶过，病树前头有万木逢春。今天听了你的一曲歌，暂且凭借这杯酒来振作精神。",notes:[{w:"巴山楚水",m:"今四川湖北一带",t:"shi"},{w:"弃置身",m:"被遗弃的人",t:"shi"},{w:"闻笛赋",m:"《思旧赋》，思念故友",t:"shi"},{w:"烂柯人",m:"王质，暗示离乡太久",t:"shi"},{w:"沉舟",m:"沉没的船",t:"shi"},{w:"侧畔",m:"旁边",t:"shi"},{w:"长精神",m:"振作精神",t:"shi"}],quiz:[{q:"「沉舟侧畔千帆过，病树前头万木春」用了什么手法？",opts:["比喻","借景抒情","借代","对比"],ans:1}]},
{id:"po26",title:"卖炭翁",author:"白居易",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"中篇",keyPoints:4,original:"卖炭翁，伐薪烧炭南山中。满面尘灰烟火色，两鬓苍苍十指黑。卖炭得钱何所营？身上衣裳口中食。可怜身上衣正单，心忧炭贱愿天寒。",translation:"有个卖炭的老头，在终南山上砍柴烧炭。满脸灰尘烟火色，两鬓斑白十指黑。卖炭得到的钱用来干什么？买身上穿的衣服和口里吃的粮食。可怜身上穿的衣裳正单薄，心里担忧炭价便宜希望天气更冷。",notes:[{w:"伐薪",m:"砍柴",t:"shi"},{w:"苍苍",m:"花白",t:"shi"},{w:"何所营",m:"用来干什么",t:"shi"},{w:"愿天寒",m:"希望天气寒冷",t:"shi"}],quiz:[{q:"这首诗反映了什么社会问题？",opts:["战争频繁","宫市对老百姓的掠夺","环境破坏","商业欺诈"],ans:1}]},
{id:"po27",title:"钱塘湖春行",author:"白居易",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"孤山寺北贾亭西，水面初平云脚低。几处早莺争暖树，谁家新燕啄春泥。乱花渐欲迷人眼，浅草才能没马蹄。最爱湖东行不足，绿杨阴里白沙堤。",translation:"孤山寺北面贾亭西边，春天的湖水刚涨平与岸齐，白云低垂与水面连成一片。好几处早来的黄莺争着飞向阳光的树枝上，哪家的新燕子在衔泥筑巢。纷乱的花朵渐渐要迷人眼，浅浅的青草刚刚能淹没马蹄。最喜欢湖东走不够，在绿杨树的阴凉里是白沙堤。",notes:[{w:"孤山",m:"西湖中的一座山",t:"shi"},{w:"贾亭",m:"西湖边的亭子",t:"shi"},{w:"云脚低",m:"低垂的云",t:"shi"},{w:"暖树",m:"向阳的树",t:"shi"},{w:"乱花",m:"纷乱的花",t:"shi"},{w:"白沙堤",m:"西湖的白堤",t:"shi"}],quiz:[{q:"这首诗的时令是？",opts:["夏天","秋天","早春","冬天"],ans:2}]},
{id:"po28",title:"雁门太守行",author:"李贺",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"黑云压城城欲摧，甲光向日金鳞开。角声满天秋色里，塞上燕脂凝夜紫。半卷红旗临易水，霜重鼓寒声不起。报君黄金台上意，提携玉龙为君死。",translation:"敌兵压境，仿佛乌云要把城墙摧垮，铠甲在阳光下金光闪烁如鳞片张开。秋色中军号声响彻满天，塞上的泥土在夜色中像胭脂凝成了紫色。半卷着红旗悄悄接近易水，浓霜冻住了鼓皮鼓声沉闷。为了报答君王黄金台上招贤的厚意，我拿着宝剑为君王战死。",notes:[{w:"黑云压城",m:"比喻敌军压境",t:"shi"},{w:"金鳞",m:"铠甲像金色的鱼鳞",t:"shi"},{w:"角声",m:"军号声",t:"shi"},{w:"燕脂",m:"泥土",t:"shi"},{w:"易水",m:"河流名",t:"shi"},{w:"黄金台",m:"燕昭王所建，招贤所用",t:"shi"},{w:"玉龙",m:"宝剑",t:"shi"}],quiz:[{q:"这首诗表达了什么感情？",opts:["游览山水","边塞将士誓死报国的决心","思乡之情","田园生活"],ans:1}]},
{id:"po29",title:"赤壁",author:"杜牧",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"折戟沉沙铁未销，自将磨洗认前朝。东风不与周郎便，铜雀春深锁二乔。",translation:"折断的兵器沉在泥沙里，铁还没有锈蚀烂掉，自己拿来磨光洗净辨认出是前朝的遗物。如果东风不给周瑜方便，恐怕春深的铜雀台上要把二乔锁起来了。",notes:[{w:"折戟",m:"折断的兵器",t:"shi"},{w:"销",m:"锈蚀",t:"shi"},{w:"将",m:"拿起",t:"shi"},{w:"前朝",m:"三国时期",t:"shi"},{w:"周郎",m:"周瑜",t:"shi"},{w:"铜雀",m:"铜雀台，曹操所建",t:"shi"},{w:"二乔",m:"大乔小乔，孙策周瑜之妻",t:"shi"}],quiz:[{q:"「东风不与周郎便，铜雀春深锁二乔」用了什么手法？",opts:["比喻","用典","借代","拟人"],ans:1}]},
{id:"po30",title:"泊秦淮",author:"杜牧",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"烟笼寒水月笼沙，夜泊秦淮近酒家。商女不知亡国恨，隔江犹唱后庭花。",translation:"烟雾笼罩着寒江月光笼罩着白沙，夜晚停泊在秦淮河靠近酒家的地方。卖唱的歌女不知道亡国的遗恨，在江对岸还唱着《玉树后庭花》。",notes:[{w:"笼",m:"笼罩",t:"shi"},{w:"秦淮",m:"秦淮河，在南京",t:"shi"},{w:"商女",m:"卖唱的歌女",t:"shi"},{w:"后庭花",m:"亡国之音",t:"shi"},{w:"亡国恨",m:"亡国的遗恨",t:"shi"}],quiz:[{q:"这首诗的主旨是？",opts:["描写夜景的优美","对统治者沉湎酒色的忧虑","对友人的思念","对战争的讽刺"],ans:1}]},
{id:"po31",title:"夜雨寄北",author:"李商隐",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"君问归期未有期，巴山夜雨涨秋池。何当共剪西窗烛，却话巴山夜雨时。",translation:"你问我什么时候回去，我还没有确定的日期，巴山的夜雨涨满了秋池。什么时候我们一起坐在西窗下剪烛花，到时候再来谈今晚巴山夜雨的情景。",notes:[{w:"寄北",m:"寄给北方的妻子/友人",t:"shi"},{w:"巴山",m:"今四川一带",t:"shi"},{w:"涨秋池",m:"秋水涨满了池塘",t:"shi"},{w:"何当",m:"什么时候",t:"shi"},{w:"剪烛",m:"剪去烛芯使灯明亮",t:"shi"},{w:"却话",m:"回来说",t:"shi"}],quiz:[{q:"这首诗用什么手法？",opts:["借景抒情","用典","比喻","对比"],ans:0}]},
{id:"po32",title:"无题",author:"李商隐",dynasty:"唐",dynastyZh:"唐代",type:"诗",length:"短篇",keyPoints:3,original:"相见时难别亦难，东风无力百花残。春蚕到死丝方尽，蜡炬成灰泪始干。晓镜但愁云鬓改，夜吟应觉月光寒。蓬山此去无多路，青鸟殷勤为探看。",translation:"见面不容易，分别也让人难分难舍，东风微弱无力，百花凋残。春蚕直到死的时候丝才吐尽，蜡烛烧成灰烬烛泪才干。早晨照镜子只愁鬓发改变，夜里吟诗应该感到月光的寒冷。你的住处从这里去蓬山路不算太远，希望青鸟殷勤地去探访。",notes:[{w:"东风",m:"春风",t:"shi"},{w:"丝方尽",m:"丝与思谐音，双关",t:"shi"},{w:"蜡炬",m:"蜡烛",t:"shi"},{w:"泪始干",m:"烛泪才干",t:"shi"},{w:"云鬓",m:"年轻时的鬓发",t:"shi"},{w:"蓬山",m:"蓬山仙岛，指对方住处",t:"shi"},{w:"青鸟",m:"传信的鸟",t:"shi"}],quiz:[{q:"「春蚕到死丝方尽，蜡炬成灰泪始干」用了什么修辞？",opts:["比喻","拟人","借代","谐音双关"],ans:3}]},
{id:"po33",title:"相见欢",author:"李煜",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"短篇",keyPoints:3,original:"无言独上西楼，月如钩。寂寞梧桐深院锁清秋。剪不断，理还乱，是离愁。别是一般滋味在心头。",translation:"默默无言独自登上西楼，月亮像钩一样弯弯的。寂寞的梧桐树，深锁清秋的庭院。剪不断，理了还是乱，这是离别的愁苦。另一种滋味萦绕在心头。",notes:[{w:"西楼",m:"词中常指居所",t:"shi"},{w:"如钩",m:"弯月",t:"shi"},{w:"锁清秋",m:"被清冷的秋色笼罩",t:"shi"},{w:"离愁",m:"离别的愁苦",t:"shi"},{w:"别是",m:"另是",t:"shi"}],quiz:[{q:"这首词表达了作者什么感情？",opts:["游玩的快乐","亡国之痛和离别之苦","对友人的思念","对故乡的眷恋"],ans:1}]},
{id:"po34",title:"渔家傲·秋思",author:"范仲淹",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"中篇",keyPoints:4,original:"塞下秋来风景异，衡阳雁去无留意。四面边声连角起，千嶂里，长烟落日孤城闭。浊酒一杯家万里，燕然未勒归无计。羌管悠悠霜满地，人不寐，将军白发征夫泪。",translation:"边塞的秋天风景与内地不同，大雁向衡阳飞去没有丝毫留恋。四面边塞的声音连同军号声响起，千山万岭之中，浓烟直上，落日西沉，孤城紧闭。一杯浊酒隔着万里思念家乡，功名未在燕然山刻石，还没有办法回去。羌笛悠扬，寒霜满地，征人们睡不着觉，将军白了头发，士兵流下眼泪。",notes:[{w:"塞下",m:"边塞",t:"shi"},{w:"边声",m:"边塞的声音",t:"shi"},{w:"千嶂",m:"千山",t:"shi"},{w:"燕然勒",m:"在燕然山刻石记功",t:"shi"},{w:"羌管",m:"羌笛",t:"shi"},{w:"不寐",m:"睡不着",t:"shi"},{w:"将军白发",m:"将军白了头发",t:"shi"}],quiz:[{q:"这首词反映了什么？",opts:["边塞的荒凉和将士的艰辛","山水游览","田园生活","宫廷生活"],ans:0}]},
{id:"po35",title:"浣溪沙",author:"晏殊",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"短篇",keyPoints:3,original:"一曲新词酒一杯，去年天气旧亭台。夕阳西下几时回？无可奈何花落去，似曾相识燕归来。小园香径独徘徊。",translation:"填一曲新词喝一杯酒，还是去年的天气和曾经的亭台。夕阳西下什么时候能回来？花朵凋落没有办法，燕子飞回来了好像曾经相识。在小园的花香里独自徘徊。",notes:[{w:"新词",m:"新填的词",t:"shi"},{w:"旧亭台",m:"曾经停过的亭台",t:"shi"},{w:"香径",m:"飘着花香的小路",t:"shi"},{w:"徘徊",m:"走来走去",t:"shi"}],quiz:[{q:"「无可奈何花落去，似曾相识燕归来」表达了什么感情？",opts:["对花的惋惜","对时光流逝的感慨，悲喜交加","对燕子的喜爱","对家乡的思念"],ans:1}]},
{id:"po36",title:"登飞来峰",author:"王安石",dynasty:"宋",dynastyZh:"宋代",type:"诗",length:"短篇",keyPoints:3,original:"飞来山上千寻塔，闻说鸡鸣见日升。不畏浮云遮望眼，自缘身在最高层。",translation:"飞来峰上有千丈高的塔，听说鸡叫时可以看见太阳升起。不害怕浮云遮住视线，自然是因为身在最高的地方。",notes:[{w:"飞来峰",m:"山名，在浙江杭州",t:"shi"},{w:"千寻",m:"千丈，形容极高",t:"shi"},{w:"浮云",m:"比喻眼前的困难或奸邪",t:"shi"},{w:"最高层",m:"最高处",t:"shi"}],quiz:[{q:"「不畏浮云遮望眼」用了什么手法？",opts:["比喻","拟人","借代","用典"],ans:0}]},
{id:"po37",title:"江城子·密州出猎",author:"苏轼",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"中篇",keyPoints:4,original:"老夫聊发少年狂，左牵黄，右擎苍，锦帽貂裘，千骑卷平冈。为报倾城随太守，亲射虎，看孙郎。酒酣胸胆尚开张，鬓微霜，又何妨！持节云中，何日遣冯唐？会挽雕弓如满月，西北望，射天狼。",translation:"老夫姑且抒发一下少年人的狂放，左手牵着黄狗，右臂举着苍鹰，头戴锦帽身穿貂裘，众多骑兵席卷山冈。为了报答满城人跟随太守出猎，我亲自射虎，看看当年的孙郎。酒喝得畅快，胆量更开，鬓发微白，又有什么妨碍！拿着符节守云中，什么时候派遣冯唐？要把雕弓拉满月，向西北望，射下天狼星。",notes:[{w:"千骑",m:"很多骑兵",t:"shi"},{w:"倾城",m:"满城的人",t:"shi"},{w:"射虎",m:"射杀老虎",t:"shi"},{w:"节",m:"符节",t:"shi"},{w:"冯唐",m:"人名，这里比喻被派来的人",t:"shi"},{w:"天狼",m:"星名，比喻西北的敌人",t:"shi"}],quiz:[{q:"这首词表达了作者什么感情？",opts:["打猎的乐趣","建功立业的壮志豪情","对故乡的思念","与友人的离别"],ans:1}]},
{id:"po38",title:"水调歌头",author:"苏轼",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"长篇",keyPoints:4,original:"明月几时有？把酒问青天。不知天上宫阙，今夕是何年。我欲乘风归去，又恐琼楼玉宇，高处不胜寒。起舞弄清影，何似在人间。转朱阁，低绮户，照无眠。不应有恨，何事长向别时圆？人有悲欢离合，月有阴晴圆缺，此事古难全。但愿人长久，千里共婵娟。",translation:"明月几时能有？端着酒问青天。不知道天上的宫殿，今晚是什么年月。我想乘风回去，又怕那美玉建造的楼阁，高的地方受不住寒冷。在月下起舞，清影翩翩，哪像在人间。月亮转过朱红色的楼阁，低低地照进雕花的门窗，照着无法入睡的人。月亮不该有什么怨恨，为什么常常在离别时圆？人有悲欢离合，月亮有阴晴圆缺，这种事自古以来就难以周全。只希望人能平安长久，千里之外共同欣赏这美好的月光。",notes:[{w:"宫阙",m:"宫殿",t:"shi"},{w:"琼楼玉宇",m:"美玉建造的楼阁",t:"shi"},{w:"不胜寒",m:"承受不住寒冷",t:"shi"},{w:"弄清影",m:"月下起舞",t:"shi"},{w:"绮户",m:"雕花的门窗",t:"shi"},{w:"婵娟",m:"美好的月光",t:"shi"}],quiz:[{q:"「但愿人长久，千里共婵娟」表达了什么感情？",opts:["对远方亲人的祝福和旷达胸襟","对月亮的赞美","对故乡的思念","对友人的思念"],ans:0}]},
{id:"po39",title:"渔家傲",author:"李清照",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"短篇",keyPoints:3,original:"天接云涛连晓雾，星河欲转千帆舞。仿佛梦魂归帝所，闻天语，殷勤问我归何处。我报路长嗟日暮，学诗谩有惊人句。九万里风鹏正起，风休住，蓬舟吹取三山去！",translation:"天空连接云涛和晨雾，银河转动像千万帆船飞舞。仿佛在梦中魂魄归向天帝居所，听到天帝说话，殷勤地问我回到哪里。我回答说路途遥远叹息已近日暮，学诗空有惊人的句子。九万里大鹏乘风正飞起，风不要停，把轻舟吹到三山去吧！",notes:[{w:"星河",m:"银河",t:"shi"},{w:"帝所",m:"天帝的居所",t:"shi"},{w:"谩有",m:"空有",t:"shi"},{w:"鹏",m:"大鹏鸟",t:"shi"},{w:"蓬舟",m:"轻如蓬草的舟",t:"shi"},{w:"三山",m:"传说中海上的三座仙山",t:"shi"}],quiz:[{q:"这首词表现了词人什么气魄？",opts:["婉约柔美","阳刚之气和宏伟理想","离愁别绪","山水情怀"],ans:1}]},
{id:"po40",title:"游山西村",author:"陆游",dynasty:"宋",dynastyZh:"宋代",type:"诗",length:"短篇",keyPoints:3,original:"莫笑农家腊酒浑，丰年留客足鸡豚。山重水复疑无路，柳暗花明又一村。箫鼓追随春社近，衣冠简朴古风存。从今若许闲乘月，拄杖无时夜叩门。",translation:"不要笑农家腊月酿的酒浑浊，丰收年景留客有丰盛的鸡和猪。山峦重叠水流曲折担心无路可走，柳绿花红忽然又出现了村庄。箫声鼓声追随春社日快到了，穿着朴素的衣裳古风犹存。今后如果允许闲时趁着月光拄杖出游，随时敲开农家的门。",notes:[{w:"腊酒浑",m:"腊月酿的酒浑浊",t:"shi"},{w:"足鸡豚",m:"丰盛的鸡和猪",t:"shi"},{w:"山重水复",m:"山峦重叠水流曲折",t:"shi"},{w:"柳暗花明",m:"柳绿花红",t:"shi"},{w:"春社",m:"春祭土地神的节日",t:"shi"},{w:"若许",m:"如果允许",t:"shi"},{w:"无时",m:"随时",t:"shi"}],quiz:[{q:"「山重水复疑无路，柳暗花明又一村」用了什么手法？",opts:["比喻","借景抒情","对比","写景中蕴含哲理"],ans:3}]},
{id:"po41",title:"南乡子·登京口北固亭有怀",author:"辛弃疾",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"中篇",keyPoints:3,original:"何处望神州？满眼风光北固楼。千古兴亡多少事？悠悠。不尽长江滚滚流。年少万兜鍪，坐断东南战未休。天下英雄谁敌手？曹刘。生子当如孙仲谋。",translation:"在哪里望中原？满眼风光都是北固楼。千古多少兴亡的事？时间长河无穷无尽。年少时统领万人在东南打仗未停休。天下的英雄谁是对手？曹操和刘备。生儿子应当像孙仲谋。",notes:[{w:"神州",m:"中原",t:"shi"},{w:"兜鍪",m:"头盔，借指士兵",t:"shi"},{w:"坐断",m:"占据",t:"shi"},{w:"孙仲谋",m:"孙权",t:"shi"}],quiz:[{q:"这首词借古讽今，表达了什么感情？",opts:["对山川的赞美","对当权者的讽刺和爱国情怀","对友人的思念","对田园生活的向往"],ans:1}]},
{id:"po42",title:"破阵子",author:"辛弃疾",dynasty:"宋",dynastyZh:"宋代",type:"词",length:"中篇",keyPoints:4,original:"醉里挑灯看剑，梦回吹角连营。八百里分麾下炙，五十弦翻塞外声，沙场秋点兵。马作的卢飞快，弓如霹雳弦惊。了却君王天下事，赢得生前身后名。可怜白发生！",translation:"醉酒中拨亮灯火看剑，梦中回到连绵的军营。八百里范围内分配烤肉给部下，五十弦奏出塞外的歌声，秋天在沙场检阅军队。马像的卢一样飞快，弓弦如雷鸣般惊响。完成了君王统一天下的大事，得到了生前身后的功名。可怜白发已经长出来了！",notes:[{w:"挑灯",m:"拨亮灯火",t:"shi"},{w:"八百里",m:"范围很广",t:"shi"},{w:"麾下",m:"部下",t:"shi"},{w:"炙",m:"烤肉",t:"shi"},{w:"的卢",m:"良马名",t:"shi"},{w:"了却",m:"完成",t:"shi"},{w:"身后名",m:"死后的功名",t:"shi"}],quiz:[{q:"「可怜白发生」表达了什么感情？",opts:["对白发老人的同情","壮志难酬的悲愤","对军营生活的赞美","对友人的思念"],ans:1}]},
{id:"po43",title:"过零丁洋",author:"文天祥",dynasty:"宋",dynastyZh:"宋代",type:"诗",length:"中篇",keyPoints:4,original:"辛苦遭逢起一经，干戈寥落四周星。山河破碎风飘絮，身世浮沉雨打萍。惶恐滩头说惶恐，零丁洋里叹零丁。人生自古谁无死？留取丹心照汗青。",translation:"因精通一种经书而出来做事辛劳国家，干戈四起，星星周围寥落了四年。山河破碎得像风吹的柳絮，身世浮沉像雨打的浮萍。在惶恐滩头诉说惶恐，在零丁洋里感叹孤苦零丁。自古以来的人生谁没有一死？留下忠心照映史册。",notes:[{w:"遭逢",m:"遭遇",t:"shi"},{w:"干戈",m:"战争",t:"shi"},{w:"四周星",m:"四年",t:"shi"},{w:"风飘絮",m:"像风吹柳絮",t:"shi"},{w:"雨打萍",m:"像雨打浮萍",t:"shi"},{w:"汗青",m:"史册",t:"shi"},{w:"丹心",m:"赤诚的心",t:"shi"}],quiz:[{q:"「人生自古谁无死？留取丹心照汗青」表达了什么感情？",opts:["对死者的哀悼","为国捐躯的决心和崇高的民族气节","对友人的思念","对故乡的眷恋"],ans:1}]},
{id:"po44",title:"天净沙·秋思",author:"马致远",dynasty:"元",dynastyZh:"元代",type:"曲",length:"短篇",keyPoints:3,original:"枯藤老树昏鸦，小桥流水人家，古道西风瘦马。夕阳西下，断肠人在天涯。",translation:"枯萎的藤蔓缠绕着老树，黄昏归巢的乌鸦，小桥下流水潺潺，几户人家，西去的古道上秋风吹着瘦马。夕阳西下，思念家乡的人还在天涯。",notes:[{w:"昏鸦",m:"黄昏归巢的乌鸦",t:"shi"},{w:"古道",m:"古老的道路",t:"shi"},{w:"瘦马",m:"消瘦的马",t:"shi"},{w:"断肠人",m:"思念家乡的人",t:"shi"},{w:"天涯",m:"天边",t:"shi"}],quiz:[{q:"这首曲的意境是？",opts:["欢乐明快","萧瑟苍凉，羁旅之思","田园风光","宴会热闹"],ans:1}]},
{id:"po45",title:"山坡羊·潼关怀古",author:"张养浩",dynasty:"元",dynastyZh:"元代",type:"曲",length:"中篇",keyPoints:4,original:"峰峦如聚，波涛如怒，山河表里潼关路。望西都，意踌躇。伤心秦汉经行处，宫阙万间都做了土。兴，百姓苦；亡，百姓苦。",translation:"山峰从四面八方聚拢，波涛黄河水怒吼，山河内外是险要的潼关路。遥望长安，思绪起伏。令人伤心的是秦汉宫殿经过的地方，万间宫阙都化成了土。国家兴起，百姓受苦；国家灭亡，百姓也受苦。",notes:[{w:"峰峦如聚",m:"山峰聚拢",t:"shi"},{w:"山河表里",m:"内有华山，外有黄河",t:"shi"},{w:"潼关",m:"关口名",t:"shi"},{w:"西都",m:"长安",t:"shi"},{w:"踌躇",m:"思绪起伏",t:"shi"},{w:"宫阙",m:"宫殿",t:"shi"},{w:"百姓苦",m:"老百姓受苦",t:"shi"}],quiz:[{q:"「兴，百姓苦；亡，百姓苦」揭示了什么？",opts:["战争带来财富","无论兴亡受苦的都是百姓","国家应该强盛","诗人对百姓的同情"],ans:1}]},
{id:"po46",title:"己亥杂诗",author:"龚自珍",dynasty:"清",dynastyZh:"清代/近代",type:"诗",length:"短篇",keyPoints:3,original:"九州生气恃风雷，万马齐喑究可哀。我劝天公重抖擞，不拘一格降人才。",translation:"中国要依靠风雷激荡才有生气，万马无声的局面终究是可悲的。我劝天公重新振作精神，打破常规降下人才。",notes:[{w:"九州",m:"中国",t:"shi"},{w:"生气",m:"活力",t:"shi"},{w:"恃",m:"依靠",t:"shi"},{w:"万马齐喑",m:"所有马都不叫，比喻沉闷的局面",t:"shi"},{w:"抖擞",m:"振作精神",t:"shi"},{w:"不拘一格",m:"打破常规",t:"shi"}],quiz:[{q:"这首诗表达了诗人什么愿望？",opts:["希望国家强盛","呼吁改革变法、振兴国家","对故乡的思念","对友人的祝福"],ans:1}]},
{id:"po47",title:"满江红",author:"秋瑾",dynasty:"清",dynastyZh:"清代/近代",type:"词",length:"中篇",keyPoints:3,original:"小住京华，早又是中秋佳节。为篱下黄花开遍，秋容如拭。四面歌残终破楚，八年风味徒思浙。苦将侬强派作蛾眉，殊未屑！身不得，男儿列，心却比，男儿烈。算平生肝胆，不因人热。俗子胸襟谁识我？英雄末路当磨折。莽红尘何处觅知音？青衫湿。",translation:"暂住在京城，很快又到中秋佳节。篱笆下菊花开遍，秋色像擦拭过一样明净。四面歌声环绕终于冲破楚地，八年风味徒然地思念着浙江。苦味把我硬派作女子，终究未屑于这样做！身不能属男儿列，心却比男儿更刚烈。计算平生的肝胆，不因别人而发热。俗子的胸襟谁了解我？英雄走到末路应当经受磨折。茫茫人世间到哪里找知音？泪水打湿了青衫。",notes:[{w:"京华",m:"京城",t:"shi"},{w:"篱下",m:"篱笆下",t:"shi"},{w:"风味",m:"风度志趣",t:"shi"},{w:"蛾眉",m:"女子",t:"shi"},{w:"烈",m:"刚烈",t:"shi"},{w:"青衫湿",m:"泪水打湿青衫",t:"shi"}],quiz:[{q:"这首词表达了作者什么感情？",opts:["游山玩水","女子不让须眉的抱负和知音难觅的感慨","宫廷生活","田园风光"],ans:1}]},
{id:"po48",title:"出师表",author:"诸葛亮",dynasty:"明清",dynastyZh:"明清",type:"表",length:"长篇",keyPoints:5,original:"先帝创业未半而中道崩殂，今天下三分，益州疲弊，此诚危急存亡之秋也。然侍卫之臣不懈于内，忠志之士忘身于外者，盖追先帝之殊遇，欲报之于陛下也。诚宜开张圣听，以光先帝遗德，恢弘志士之气，不宜妄自菲薄，引喻失义，以塞忠谏之路也。",translation:"先帝创立统一大业还没完成一半就中途去世了，如今天下分成三国，益州困乏，这实在是危急存亡的关头啊。然而侍卫的大臣在宫内不懈怠，忠诚的志士在外面忘我工作，这是因为追念先帝的特殊待遇，想要报答在陛下身上啊。确实应该扩大听闻，以光大先帝留下的德行，振作志士的士气，不应该随随便便看轻自己，说话不当，堵塞忠诚劝谏的路子啊。",notes:[{w:"崩殂",m:"去世",t:"shi"},{w:"三分",m:"分成三国",t:"shi"},{w:"疲弊",m:"困乏",t:"shi"},{w:"侍卫之臣",m:"内廷的大臣",t:"shi"},{w:"忘身",m:"忘我工作",t:"shi"},{w:"殊遇",m:"特殊待遇",t:"shi"},{w:"开张圣听",m:"扩大听闻",t:"shi"},{w:"恢弘",m:"振作",t:"shi"},{w:"妄自菲薄",m:"随随便便看轻自己",t:"shi"}],quiz:[{q:"「先帝创业未半而中道崩殂」中的「先帝」指的是？",opts:["刘备","曹操","孙权","诸葛亮"],ans:0}]},
{id:"po49",title:"桃花源记",author:"陶渊明",dynasty:"明清",dynastyZh:"明清",type:"记",length:"中篇",keyPoints:4,original:"晋太元中，武陵人捕鱼为业。缘溪行，忘路之远近。忽逢桃花林，夹岸数百步，中无杂树，芳草鲜美，落英缤纷，渔人甚异之。复前行，欲穷其林。林尽水源，便得一山，山有小口，仿佛若有光。便舍船，从口入。初极狭，才通人。复行数十步，豁然开朗。土地平旷，屋舍俨然，有良田美池桑竹之属。阡陌交通，鸡犬相闻。其中往来种作，男女衣着，悉如外人。黄发垂髫，并怡然自乐。",translation:"晋朝太元年间，有个武陵人以捕鱼为职业。沿着溪水划船，忘记了路的远近。忽然遇见桃花林，溪岸几百步内没有杂树，芳草鲜艳美好，坠落的花瓣纷纷繁盛，渔人觉得很惊异。再向前走，想要走到林子的尽头。林子的尽头是溪水的源头，就看到一座山，山上有个小洞口，好像有光。便舍了船，从洞口进去。起初极窄，仅容一人通过。再走几十步，忽然开阔明亮。土地平坦广阔，房屋整齐。田间小路交错相通，鸡鸣狗叫互相能听见。在其中来来往往耕种操作的，男女穿的衣服，都像外面的人。老人和小孩，都安适快乐。",notes:[{w:"武陵",m:"地名，今湖南常德",t:"shi"},{w:"落英",m:"坠落的花瓣",t:"shi"},{w:"俨然",m:"整齐的样子",t:"shi"},{w:"阡陌交通",m:"田间小路交错相通",t:"shi"},{w:"黄发垂髫",m:"老人和小孩",t:"shi"},{w:"怡然自乐",m:"安适快乐的样子",t:"shi"}],quiz:[{q:"桃花源反映了作者什么思想？",opts:["对乱世的逃避和对理想社会的向往","对农业生产的重视","对旅游的热爱","对友人的思念"],ans:0}]},
{id:"po50",title:"三峡",author:"郦道元",dynasty:"明清",dynastyZh:"明清",type:"记",length:"中篇",keyPoints:4,original:"自三峡七百里中，两岸连山，略无阙处。重岩叠嶂，隐天蔽日，自非亭午夜分，不见曦月。至于夏水襄陵，沿泝阻绝。或王命急宣，有时朝发白帝，暮到江陵，其间千二百里，虽乘奔御风不以疾也。春冬之时，则素湍绿潭，回清倒影，绝巘多生怪柏，悬泉瀑布，飞漱其间，清荣峻茂，良多趣味。每至晴初霜旦，林寒涧肃，常有高猿长啸，属引凄异，空谷传响，哀转久绝。",translation:"在三峡七百里中，两岸都是相连的山，几乎没有断缺的地方。重重的岩层和重叠的山峰，遮蔽了天日，如果不是正午和半夜，就看不见太阳月亮。到了夏天水涨淹上山陵的时候，顺流逆流都被阻断不能通行，有时皇帝有命令急速传达，早晨从白帝城出发，傍晚就到江陵，这中间一千二百里，即使骑着快马驾着风也不如船快。春冬季节，则是白色的急流碧绿的潭水，回旋着清流倒映着山影，极高的山顶上生长着怪柏，悬挂的泉水瀑布，在山间飞流冲刷，水清树荣，山峻草茂，实在很有趣味。每到初晴和降霜的早晨，林中寒冷山沟肃寂，常常有高处的猿猴长长地啼叫，声音连续不断异常凄厉。",notes:[{w:"阙处",m:"断缺的地方",t:"shi"},{w:"亭午夜分",m:"正午和半夜",t:"shi"},{w:"曦月",m:"太阳月亮",t:"shi"},{w:"襄陵",m:"水淹上山陵",t:"shi"},{w:"沿泝",m:"顺流和逆流",t:"shi"},{w:"素湍",m:"白色的急流",t:"shi"},{w:"悬泉",m:"悬挂的泉水",t:"shi"},{w:"霜旦",m:"降霜的早晨",t:"shi"},{w:"属引",m:"连续不断",t:"shi"}],quiz:[{q:"「巴东三峡巫峡长，猿鸣三声泪沾裳」反映了三峡什么特点？",opts:["三峡风景优美","猿猴很多","三峡秋天的高猿啼声凄异","水流很急"],ans:2}]},
{id:"po51",title:"马说",author:"韩愈",dynasty:"明清",dynastyZh:"明清",type:"说",length:"中篇",keyPoints:4,original:"世有伯乐，然后有千里马。千里马常有，而伯乐不常有。故虽有名马，祇辱于奴隶人之手，骈死于槽枥之间，不以千里称也。马之千里者，一食或尽粟一石。食马者不知其能千里而食也。是马也，虽有千里之能，食不饱，力不足，才美不外见，且欲与常马等不可得，安求其能千里也？",translation:"世间先有伯乐，然后才有千里马。千里马常有，但伯乐不常有。所以虽然有好马，也只是辱没在马夫手里，和普通的马一起死在马槽里，不能以千里马著称。日行千里的马，一顿有时能吃完一石粟米。喂马的人不知道它能日行千里而喂养。这样的马，虽然有日行千里的能力，吃不饱，力量不足，才能和优点不能表现出来，想要和普通的马相等都做不到，怎能要求它日行千里呢？",notes:[{w:"伯乐",m:"善于相马的人",t:"shi"},{w:"千里马",m:"日行千里的马",t:"shi"},{w:"骈死",m:"和普通的马一起死",t:"shi"},{w:"槽枥",m:"马槽",t:"shi"},{w:"粟",m:"谷子",t:"shi"},{w:"食马者",m:"喂马的人",t:"shi"},{w:"等",m:"相等",t:"shi"}],quiz:[{q:"这篇「说」的主旨是？",opts:["论说养马的方法","以千里马比喻人才，批评埋没人才的现象","描写马的形态","记叙马的种类"],ans:1}]},
{id:"po52",title:"陋室铭",author:"刘禹锡",dynasty:"明清",dynastyZh:"明清",type:"铭",length:"短篇",keyPoints:3,original:"山不在高，有仙则名。水不在深，有龙则灵。斯是陋室，惟吾德馨。苔痕上阶绿，草色入帘青。谈笑有鸿儒，往来无白丁。可以调素琴，阅金经。无丝竹之乱耳，无案牍之劳形。南阳诸葛庐，西蜀子云亭。孔子云：何陋之有？",translation:"山不在于高，有仙人就著名。水不在于深，有龙就神灵。这是简陋的屋子，只是我的品德芳香。苔藓长上台阶绿，草色映入帘子青。谈笑的都是大儒，来往的没有平民。可以弹弹素琴，看看佛经。没有管弦乐曲扰乱耳朵，没有官府文书劳累身心。像南阳诸葛亮的草庐，西蜀扬子云的亭子。孔子说：有什么简陋的呢？",notes:[{w:"德馨",m:"品德芳香",t:"shi"},{w:"鸿儒",m:"大儒",t:"shi"},{w:"白丁",m:"平民",t:"shi"},{w:"素琴",m:"朴素的琴",t:"shi"},{w:"金经",m:"佛经",t:"shi"},{w:"丝竹",m:"管弦乐器",t:"shi"},{w:"案牍",m:"官府文书",t:"shi"},{w:"劳形",m:"劳累身体",t:"shi"}],quiz:[{q:"「斯是陋室，惟吾德馨」用了什么手法？",opts:["比喻","对比","托物言志","借景抒情"],ans:2}]},
{id:"po53",title:"小石潭记",author:"柳宗元",dynasty:"明清",dynastyZh:"明清",type:"记",length:"中篇",keyPoints:3,original:"从小丘西行百二十步，隔篁竹，闻水声，如鸣珮环，心乐之。伐竹取道，下见小潭，水尤清冽。全石以为底，近岸，卷石底以出，为坻，为屿，为嵁，为岩。青树翠蔓，蒙络摇缀，参差披拂。潭中鱼可百许头，皆若空游无所依。日光下澈，影布石上，佁然不动；俶尔远逝，往来翕忽，似与游者相乐。",translation:"从小土山往西走一百二十步，隔着竹林，听到水声，像珮环碰撞的声音，心里很高兴。砍竹子开路，向下看见小潭，水特别清凉。以整块石头为底，靠近岸边，石底有些部分翻卷露出水面，形成坻、屿、嵁、岩各种形状。青树绿藤，遮盖缠绕摇动连接，高高低低随风飘荡。潭中的鱼大约一百来条，都像在空中游动没有什么依靠。阳光直照到水底，鱼影散布在石头上，静静的一动不动；忽然向远处游去，来来往往轻快迅速，好像和游玩的人在互相嬉戏。",notes:[{w:"篁竹",m:"竹林",t:"shi"},{w:"珮环",m:"玉制佩饰",t:"shi"},{w:"清冽",m:"特别清凉",t:"shi"},{w:"坻屿嵁岩",m:"各种石头形状",t:"shi"},{w:"翠蔓",m:"绿藤",t:"shi"},{w:"下澈",m:"直照到水底",t:"shi"},{w:"翕忽",m:"轻快迅速",t:"shi"}],quiz:[{q:"这篇文章的写作特色是？",opts:["借景抒情，情景交融","论说道理","描写战争","记叙历史"],ans:0}]},
{id:"po54",title:"岳阳楼记",author:"范仲淹",dynasty:"明清",dynastyZh:"明清",type:"记",length:"长篇",keyPoints:5,original:"庆历四年春，滕子京谪守巴陵郡。越明年，政通人和，百废具兴。乃重修岳阳楼，增其旧制，刻唐贤今人诗赋于其上，属予作文以记之。予观夫巴陵胜状，在洞庭一湖。衔远山，吞长江，浩浩汤汤，横无际涯；朝晖夕阴，气象万千；此则岳阳楼之大观也，前人之述备矣。然则北通巫峡，南极潇湘，迁客骚人，多会于此，览物之情，得无异乎？",translation:"庆历四年的春天，滕子京被贬为巴陵郡太守。过了第二年，政事顺利，百姓和乐，许多荒废的事业都兴办起来了。于是重新修建岳阳楼，扩大它原有的规模，在楼上刻上唐代名士和当代人的诗赋，嘱托我写文章来记述这件事。我看那巴陵郡最美的景色，全在这洞庭湖上。它包含远方的山脉，吞吐长江的流水，水流浩浩荡荡，宽广得看不到边际；早晨阳光灿烂，傍晚暮色笼罩，景象千变万化，这就是岳阳楼的壮丽景象。既然这样，那么北面直通巫峡，南面直到潇水湘江，被贬的官员和诗人常常在这里聚会，他们观赏景物的心情，大概会有不同吧？",notes:[{w:"谪守",m:"被贬做太守",t:"shi"},{w:"越明年",m:"到了第二年",t:"shi"},{w:"胜状",m:"美景",t:"shi"},{w:"浩浩汤汤",m:"水势浩大",t:"shi"},{w:"大观",m:"壮丽的景象",t:"shi"},{w:"迁客",m:"被贬的官员",t:"shi"},{w:"骚人",m:"诗人",t:"shi"}],quiz:[{q:"「先天下之忧而忧，后天下之乐而乐」出自本文，哪项正确？",opts:["表达了作者忧国忧民的情怀","表达了及时行乐的思想","表达了归隐山林的愿望","表达了功成名就的喜悦"],ans:0}]},
{id:"po55",title:"醉翁亭记",author:"欧阳修",dynasty:"明清",dynastyZh:"明清",type:"记",length:"长篇",keyPoints:4,original:"环滁皆山也。其西南诸峰，林壑尤美，望之蔚然而深秀者，琅琊也。山行六七里，渐闻水声潺潺而泻出于两峰之间者，酿泉也。峰回路转，有亭翼然临于泉上者，醉翁亭也。作亭者谁？山之僧智仙也。名之者谁？太守自谓也。太守与客来饮于此，饮少辄醉，而年又最高，故自号曰醉翁也。醉翁之意不在酒，在乎山水之间也。山水之乐，得之心而寓之酒也。",translation:"环绕滁州的都是山。它西南各个山峰，山林山谷特别优美，远远望去树木茂盛而幽深秀丽的，是琅琊山。沿着山路走六七里，渐渐听到潺潺的水声从两峰之间泻下来的，是酿泉。山路回环转弯，有座亭子像鸟翅一样高踞在泉边的，是醉翁亭。建亭的是谁？是山里的和尚智仙。给亭子命名的是谁？是太守用自己的别号。太守和客人来这里喝酒，喝一点就醉，而且年纪又最大，所以自己起了个别号叫醉翁。醉翁的情趣不在酒上，在乎山水之间。游山玩水的乐趣，体会于心而寄托在酒上。",notes:[{w:"环滁",m:"环绕滁州",t:"shi"},{w:"林壑",m:"山林山谷",t:"shi"},{w:"蔚然",m:"茂盛的样子",t:"shi"},{w:"酿泉",m:"泉名",t:"shi"},{w:"翼然",m:"像鸟翅的样子",t:"shi"},{w:"醉翁",m:"欧阳修的自号",t:"shi"},{w:"寓",m:"寄托",t:"shi"}],quiz:[{q:"「醉翁之意不在酒，在乎山水之间也」用了什么手法？",opts:["比喻","借代","托事言志","拟人"],ans:2}]},
{id:"po56",title:"爱莲说",author:"周敦颐",dynasty:"明清",dynastyZh:"明清",type:"说",length:"短篇",keyPoints:3,original:"水陆草木之花，可爱者甚蕃。晋陶渊明独爱菊。自李唐来，世人甚爱牡丹。予独爱莲之出淤泥而不染，濯清涟而不妖，中通外直，不蔓不枝，香远益清，亭亭净植，可远观而不可亵玩焉。",translation:"水里陆地上草本木本的花，值得喜爱的很多。晋朝陶渊明只爱菊花。自从唐代以来，世人很爱牡丹。我却只爱莲花从淤泥中出来却不沾染，在清水里洗涤却不妖艳，茎中间贯通外形笔直，不蔓不枝，香气远播更加清芬，笔直地洁净地立在那里，可以远远地观赏却不可以轻慢地玩弄。",notes:[{w:"蕃",m:"多",t:"shi"},{w:"淤泥",m:"河底淤泥",t:"shi"},{w:"濯清涟",m:"在清水中洗涤",t:"shi"},{w:"不妖",m:"不妖艳",t:"shi"},{w:"不蔓不枝",m:"不蔓延不旁生枝节",t:"shi"},{w:"亵玩",m:"轻慢地玩弄",t:"shi"}],quiz:[{q:"这篇文章以莲自喻，表现了作者什么情操？",opts:["对菊花的喜爱","洁身自好的高尚节操","对名利的追求","对莲花的厌恶"],ans:1}]},
{id:"po57",title:"记承天寺夜游",author:"苏轼",dynasty:"明清",dynastyZh:"明清",type:"记",length:"短篇",keyPoints:3,original:"元丰六年十月十二日夜，解衣欲睡，月色入户，欣然起行。念无与为乐者，遂至承天寺寻张怀民。怀民亦未寝，相与步于中庭。庭下如积水空明，水中藻、荇交横，盖竹柏影也。何夜无月？何处无竹柏？但少闲人如吾两人者耳。",translation:"元丰六年十月十二日夜里，解开衣服想睡觉，月光照进门来，高兴地起身出门。想到没有可以和自己同乐的人，就到承天寺找张怀民。怀民也还没睡，两人共同在院中散步。庭下如同积水一般清澈透明，水中藻、荇交错纵横，原来是竹子和柏树的影子。哪一夜没有月亮？哪里没有竹柏？只是缺少像我们两个这样的闲人罢了。",notes:[{w:"入户",m:"照进门来",t:"shi"},{w:"相与",m:"共同",t:"shi"},{w:"空明",m:"清澈透明",t:"shi"},{w:"藻荇",m:"水藻和荇菜",t:"shi"},{w:"闲人",m:"清闲的人",t:"shi"}],quiz:[{q:"「何夜无月？何处无竹柏？但少闲人如吾两人者耳」表达了什么？",opts:["月夜很常见","作者和张怀民被贬谪的闲适以自嘲","作者对月亮的赞美","对友人的责备"],ans:1}]},
{id:"po58",title:"送东阳马生序",author:"宋濂",dynasty:"明清",dynastyZh:"明清",type:"序",length:"长篇",keyPoints:4,original:"余幼时即嗜学。家贫，无从致书以观，每假借于藏书之家，手自笔录，计日以还。天大寒，砚冰坚，手指不可屈伸，弗之怠。录毕，走送之，不敢稍逾约。以是人多以书假余，余因得遍观群书。既加冠，益慕圣贤之道，又患无硕师名人与游，尝趋百里外，从乡之先达执经叩问。先达德隆望尊，门人弟子填其室，未尝稍降辞色。余立侍左右，援疑质理，俯身倾耳以请；或遇其叱咄，色愈恭，礼愈至，不敢出一言以复；俟其欣悦，则又请焉。故余虽愚，卒获有所闻。",translation:"我幼时就爱好学习。家里穷，没有办法买书来看，常常向有书的人家借，亲手用笔抄录，算着日子归还。天气特别冷，砚台墨汁冻成冰，手指冻僵了不能弯曲伸展，也不懈怠抄写。抄写完毕，赶快送还，不敢稍微超过约定的日期。因此人们多把书借给我，我因此能够遍读各种书籍。成年以后，更加仰慕圣贤的道理，又忧虑没有大师名人和他们交游，曾经跑到百里之外，拿着经书向同乡有道德学问的前辈请教。前辈道德高声望大，门人弟子挤满了他家，不曾稍微改变言辞脸色。我站在旁边侍候，提出疑难询问道理，弯着身子侧着耳朵请教；有时遭到训斥，脸色更加谦恭，礼节更加周到，不敢回一句话。等他高兴了，就再去请教。所以我虽然愚钝，终于还是获得了不少学问。",notes:[{w:"嗜学",m:"爱好学习",t:"shi"},{w:"致书",m:"买书",t:"shi"},{w:"假借",m:"借",t:"shi"},{w:"逾约",m:"超过约定期限",t:"shi"},{w:"加冠",m:"成年",t:"shi"},{w:"硕师",m:"大师",t:"shi"},{w:"叱咄",m:"训斥",t:"shi"},{w:"卒获",m:"终于获得",t:"shi"}],quiz:[{q:"这篇文章反映了作者什么品质？",opts:["艰难求学的勤奋和诚心","对外出旅游的热爱","对老师的尊敬","对金钱的追求"],ans:0}]},
{id:"po59",title:"湖心亭看雪",author:"张岱",dynasty:"明清",dynastyZh:"明清",type:"记",length:"短篇",keyPoints:3,original:"崇祯五年十二月，余住西湖。大雪三日，湖中人鸟声俱绝。是日更定矣，余拏一小舟，拥毳衣炉火，独往湖心亭看雪。雾凇沆砀，天与云与山与水，上下一白。湖上影子，惟长堤一痕、湖心亭一点、与余舟一芥、舟中人两三粒而已。",translation:"崇祯五年十二月，我住在西湖。大雪下了三天，湖中人和鸟的声音都消失了。这一天晚上八点左右，我撑一条小船，穿上毛皮衣带着炉火，独自去湖心亭看雪。花草树木都结满了雾凇，弥漫一片，天和云和山和水，上上下下全是白色。湖上的影子，只有长堤一道痕迹、湖心亭一个点、和我的船一粒草子、船上的人两三粒罢了。",notes:[{w:"崇祯",m:"明思宗年号",t:"shi"},{w:"更定",m:"晚上八点左右",t:"shi"},{w:"拏",m:"撑",t:"shi"},{w:"毳衣",m:"毛皮衣",t:"shi"},{w:"雾凇",m:"雾气凝成的冰花",t:"shi"},{w:"沆砀",m:"白茫茫一片",t:"shi"},{w:"上下一白",m:"上下全是白色",t:"shi"}],quiz:[{q:"「湖上影子，惟长堤一痕、湖心亭一点」用了什么手法？",opts:["比喻","夸张","白描，以小见大","拟人"],ans:2}]},
{id:"po60",title:"河中石兽",author:"纪昀",dynasty:"明清",dynastyZh:"明清",type:"记",length:"中篇",keyPoints:3,original:"沧州南一寺临河干，山门圮于河，二石兽并沉焉。阅十余岁，僧募金重修，求二石兽，竟不可得，以为顺流下矣。棹数小舟，曳铁钯，寻十余里，无迹。一讲学家设帐寺中，闻之，笑曰：石性坚重，沙性松浮，湮于沙上，渐沉渐深耳。沿河求之，不亦颠乎？众服为确论。一老河兵闻之，又笑曰：凡河中失石，当求之于上流。盖石之坚者，啮沙泥为，冲激龈。仍下不动，上游击之，如向下迎石处辟。",translation:"沧州南面一座寺庙靠近河边，寺庙的山门倒塌在河里，两只石兽一起沉入水底。经过十多年，和尚募捐重修，找那两只石兽，竟然找不到，认为被水冲到下游去了。划几只小船，拖着铁钯，找了十几里，没有踪迹。一位讲学家在寺里设帐讲学，听说了，笑笑说石头性质坚硬沉重，沙子性质松软轻浮，会渐渐沉入沙里，越沉越深。沿着河找它，不是很颠倒吗？众人信服认为是正确的结论。一个老河兵听说了，又笑笑说大凡河中失落石头，应当到上游去找。",notes:[{w:"临河干",m:"靠近河边",t:"shi"},{w:"山门",m:"寺庙的门",t:"shi"},{w:"圮",m:"倒塌",t:"shi"},{w:"募金",m:"募捐金钱",t:"shi"},{w:"湮",m:"沉埋",t:"shi"},{w:"铁钯",m:"农具",t:"shi"},{w:"讲学家",m:"讲学的人",t:"shi"},{w:"河兵",m:"巡河的兵",t:"shi"}],quiz:[{q:"讲学家和老河兵谁的说法正确？",opts:["讲学家","老河兵","都不对","都对的"],ans:1}]}
];

const ALL_ARTICLES = WENYAN_DATA.concat(POETRY_DATA);

/// APP LOGIC ///
var currentSection = 'all';
var currentDynasty = 'all';
var currentArticle = null;
var mediaRecorder = null;
var audioChunks = [];
var recBlob = null;
var recUrl = null;
var isRecording = false;

function isWy(id) { return !!WENYAN_DATA.find(function(w){return w.id === id;}); }

function initDynastyBtns() {
  var container = document.getElementById('dynastyWrap');
  container.innerHTML = '';
  var allBtn = document.createElement('button');
  allBtn.className = 'dy-btn' + (currentDynasty === 'all' ? ' active' : '');
  allBtn.dataset.dynasty = 'all';
  allBtn.textContent = '全部';
  allBtn.onclick = function(){ selectDynasty('all'); };
  container.appendChild(allBtn);
  for (var i = 0; i < ALL_DYNASTIES.length; i++) {
    var d = ALL_DYNASTIES[i];
    var btn = document.createElement('button');
    btn.className = 'dy-btn' + (currentDynasty === d.dynasty ? ' active' : '');
    btn.dataset.dynasty = d.dynasty;
    btn.textContent = d.label + '(' + d.total + ')';
    btn.onclick = (function(dyn){ return function(){ selectDynasty(dyn); }; })(d.dynasty);
    container.appendChild(btn);
  }
}

function selectDynasty(d) {
  currentDynasty = d;
  var btns = document.querySelectorAll('.dy-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.dynasty === d);
  }
  renderList();
}

function selectSection(sec) {
  currentSection = sec;
  var btns = document.querySelectorAll('.tab-btn');
  for (var i = 0; i < btns.length; i++) {
    btns[i].classList.toggle('active', btns[i].dataset.section === sec);
  }
  renderList();
}

function getFiltered() {
  var result = [];
  for (var i = 0; i < ALL_ARTICLES.length; i++) {
    var a = ALL_ARTICLES[i];
    var sectionOk = currentSection === 'all' || 
      (currentSection === 'wy' && isWy(a.id)) ||
      (currentSection === 'py' && !isWy(a.id));
    var dynastyOk = currentDynasty === 'all' || a.dynasty === currentDynasty;
    if (sectionOk && dynastyOk) result.push(a);
  }
  return result;
}

function renderList() {
  var list = document.getElementById('articleList');
  var filtered = getFiltered();
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty">该分类下暂无内容</div>';
    return;
  }
  var html = '';
  for (var i = 0; i < filtered.length; i++) {
    var a = filtered[i];
    var isW = isWy(a.id);
    var sColor = isW ? '#8b4513' : '#2e7d32';
    var sTag = isW ? '文言' : '诗词';
    var pts = '';
    var kp = Math.min(a.keyPoints, 3);
    for (var p = 0; p < kp; p++) pts += '<span class="point-tag">&#9679;</span>';
    html += '<div class="list-item" onclick="openDetail(\'' + a.id + '\')">' +
      '<div class="item-header">' +
      '<span class="item-title">' + a.title + '</span>' +
      '<span class="item-dynasty" style="background:' + sColor + '20;color:' + sColor + '">' + sTag + ' &#183; ' + a.dynastyZh + '</span>' +
      '</div>' +
      '<div class="item-meta"><span>&#128100; ' + a.author + '</span><span>&#128221; ' + a.type + '</span><span>&#11088; ' + a.keyPoints + '考点</span></div>' +
      '<div class="item-points">' + pts + '</div></div>';
  }
  list.innerHTML = html;
}

function openDetail(id) {
  currentArticle = null;
  for (var i = 0; i < ALL_ARTICLES.length; i++) {
    if (ALL_ARTICLES[i].id === id) { currentArticle = ALL_ARTICLES[i]; break; }
  }
  if (!currentArticle) return;
  document.getElementById('detailTitle').textContent = currentArticle.title;
  var isW = isWy(id);
  var section = isW ? '文言文' : '古诗词';
  document.getElementById('detailMeta').textContent = currentArticle.author + ' &#183; ' + currentArticle.dynastyZh + ' &#183; ' + currentArticle.type + ' &#183; ' + currentArticle.length + ' &#183; ' + section;
  document.getElementById('originalText').textContent = currentArticle.original;
  var tagsContainer = document.getElementById('shiyiTags');
  tagsContainer.innerHTML = '';
  var seen = {};
  var uniqueNotes = [];
  for (var ni = 0; ni < currentArticle.notes.length; ni++) {
    var note = currentArticle.notes[ni];
    if (!seen[note.w]) {
      seen[note.w] = true;
      uniqueNotes.push(note);
      var tag = document.createElement('span');
      tag.className = 'shiyi-tag ' + (note.t === 'shi' ? 'shi-tag' : 'xu-tag');
      tag.textContent = note.w + ': ' + note.m;
      tagsContainer.appendChild(tag);
    }
  }
  var notesContainer = document.getElementById('notesList');
  notesContainer.innerHTML = '';
  for (var ni = 0; ni < uniqueNotes.length; ni++) {
    var note = uniqueNotes[ni];
    var div = document.createElement('div');
    div.className = 'note-item';
    div.innerHTML = '<div class="note-word ' + (note.t === 'shi' ? 'shi' : 'xu') + '">' + note.w + ' <span style="font-weight:400;font-size:12px;color:#9a8878">(' + (note.t === 'shi' ? '实词' : '虚词') + ')</span></div><div class="note-meaning">' + note.m + '</div>';
    notesContainer.appendChild(div);
  }
  document.getElementById('translationText').textContent = currentArticle.translation;
  var kaodianContainer = document.getElementById('kaodianList');
  kaodianContainer.innerHTML = '';
  for (var qi = 0; qi < currentArticle.quiz.length; qi++) {
    var q = currentArticle.quiz[qi];
    var qDiv = document.createElement('div');
    qDiv.className = 'kaodian-item';
    var optsHtml = '';
    for (var oi = 0; oi < q.opts.length; oi++) {
      optsHtml += '<div class="opt-item" data-qi="' + qi + '" data-oi="' + oi + '">' + String.fromCharCode(65 + oi) + '. ' + q.opts[oi] + '</div>';
    }
    qDiv.innerHTML = '<div class="kaodian-q">' + (qi + 1) + '. ' + q.q + '</div><div class="opts-list" id="opts-' + qi + '">' + optsHtml + '</div>';
    kaodianContainer.appendChild(qDiv);
  }
  kaodianContainer.querySelectorAll('.opt-item').forEach(function(item) {
    item.onclick = function() {
      checkAnswer(parseInt(item.getAttribute('data-qi')), parseInt(item.getAttribute('data-oi')));
    };
  });
  switchTab('yuanwen');
  document.getElementById('detailPage').style.display = 'block';
  document.getElementById('detailPage').scrollTop = 0;
  stopPlayback();
  stopRecording();
}

function checkAnswer(qi, oi) {
  var q = currentArticle.quiz[qi];
  var container = document.getElementById('opts-' + qi);
  var items = container.querySelectorAll('.opt-item');
  for (var i = 0; i < items.length; i++) {
    items[i].style.pointerEvents = 'none';
    if (i === q.ans) items[i].classList.add('correct');
    else if (i === oi && oi !== q.ans) items[i].classList.add('wrong');
  }
}

function switchTab(tab) {
  var tabs = document.querySelectorAll('.detail-tab');
  for (var i = 0; i < tabs.length; i++) {
    tabs[i].classList.toggle('active', tabs[i].dataset.tab === tab);
  }
  var panels = document.querySelectorAll('.panel');
  for (var i = 0; i < panels.length; i++) {
    panels[i].classList.toggle('active', panels[i].id === 'panel-' + tab);
  }
}

function closeDetail() {
  document.getElementById('detailPage').style.display = 'none';
  stopPlayback();
  stopRecording();
}

function playOriginal() {
  if (!currentArticle) return;
  stopPlayback();
  var utter = new SpeechSynthesisUtterance(currentArticle.original);
  utter.lang = 'zh-CN';
  utter.rate = 0.85;
  var btn = document.getElementById('playBtn');
  btn.textContent = '&#9646;&#9646; 播放中...';
  utter.onend = function() { btn.textContent = '&#9654; 听朗读'; };
  utter.onerror = function() { btn.textContent = '&#9654; 听朗读'; };
  speechSynthesis.speak(utter);
}

function stopPlayback() {
  if (speechSynthesis.speaking) speechSynthesis.cancel();
  var btn = document.getElementById('playBtn');
  if (btn) btn.textContent = '&#9654; 听朗读';
}

async function toggleRec() {
  if (!isRecording) {
    try {
      var stream = await navigator.mediaDevices.getUserMedia({audio: true});
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = function(e) { audioChunks.push(e.data); };
      mediaRecorder.onstop = function() {
        recBlob = new Blob(audioChunks, {type: 'audio/webm'});
        recUrl = URL.createObjectURL(recBlob);
        document.getElementById('playRecBtn').style.display = 'inline-block';
        stream.getTracks().forEach(function(t){ t.stop(); });
      };
      mediaRecorder.start();
      isRecording = true;
      var btn = document.getElementById('recBtn');
      btn.textContent = '&#9646;&#9646; 停止录音';
      btn.classList.add('recording');
    } catch(e) { alert('请允许麦克风权限'); }
  } else {
    stopRecording();
  }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    var btn = document.getElementById('recBtn');
    btn.textContent = '&#127908; 开始录音';
    btn.classList.remove('recording');
  }
}

function playRecording() {
  if (recUrl) new Audio(recUrl).play();
}

// Bind events
document.querySelectorAll('.tab-btn').forEach(function(b) {
  b.onclick = function() { selectSection(b.dataset.section); };
});
document.querySelectorAll('.detail-tab').forEach(function(t) {
  t.onclick = function() { switchTab(t.dataset.tab); };
});
document.getElementById('backBtn').onclick = closeDetail;
document.getElementById('backBtn2').onclick = closeDetail;
document.getElementById('playBtn').onclick = playOriginal;
document.getElementById('recBtn').onclick = toggleRec;
document.getElementById('playRecBtn').onclick = playRecording;

initDynastyBtns();
renderList();
